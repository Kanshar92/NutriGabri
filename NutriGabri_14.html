<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="NutriGabri"/>
<title>NutriGabri</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
:root{
  --cream:#F7F3ED;
  --cream2:#EDE8DF;
  --cream3:#E2DBD0;
  --forest:#1C3829;
  --forest2:#2D5540;
  --sage:#6B9B76;
  --sage2:#A8C4A0;
  --sage3:#D4E6CF;
  --terra:#C4714A;
  --terra2:#E8956D;
  --terra3:#F5DDD4;
  --gold:#B8914A;
  --gold2:#F0DEB4;
  --charcoal:#2A2A28;
  --mid:#6B6860;
  --light:#9E9B94;
  --line:rgba(42,42,40,.08);
  --line2:rgba(42,42,40,.05);
  --shadow:0 2px 20px rgba(28,56,41,.08);
  --shadow2:0 8px 40px rgba(28,56,41,.12);
  --r:20px;
  --r2:14px;
  --font-display:'Cormorant Garamond',Georgia,serif;
  --font:'DM Sans',-apple-system,sans-serif;
  --nav-h:80px;
}
html,body{
  height:100%;
  color:var(--charcoal);
  font-family:var(--font);
  overflow-x:hidden;
  background:var(--cream);
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(107,155,118,.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 85% 20%, rgba(184,145,74,.13) 0%, transparent 55%),
    radial-gradient(ellipse 70% 60% at 10% 80%, rgba(196,113,74,.10) 0%, transparent 55%),
    radial-gradient(ellipse 80% 70% at 90% 85%, rgba(107,155,118,.12) 0%, transparent 60%),
    var(--cream);
  background-size:200% 200%;
  animation:gradientShift 14s ease-in-out infinite alternate;
}
@keyframes gradientShift{
  0%  {background-position:0% 0%}
  25% {background-position:50% 20%}
  50% {background-position:100% 50%}
  75% {background-position:40% 80%}
  100%{background-position:10% 100%}
}
#app,#splash{position:relative;z-index:1}
::-webkit-scrollbar{display:none}
input,select,button,textarea{font-family:var(--font);outline:none;border:none}
select{-webkit-appearance:none;cursor:pointer}
button{cursor:pointer;background:none}
input[type=date]{color-scheme:light}
input[type=range]{-webkit-appearance:none;height:3px;border-radius:99px;background:var(--cream3);width:100%}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--forest);cursor:pointer;box-shadow:0 2px 8px rgba(28,56,41,.3)}

/* ── SPLASH ── */
#splash{
  position:fixed;inset:0;z-index:1000;
  background:
    radial-gradient(ellipse 70% 50% at 15% 15%, rgba(45,85,64,.9) 0%, transparent 60%),
    radial-gradient(ellipse 60% 55% at 85% 80%, rgba(107,155,118,.6) 0%, transparent 55%),
    radial-gradient(ellipse 80% 60% at 80% 10%, rgba(184,145,74,.3) 0%, transparent 50%),
    var(--forest);
  background-size:200% 200%;
  animation:splashGrad 10s ease-in-out infinite alternate;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 32px;
  transition:opacity .6s ease, transform .6s ease;
}
@keyframes splashGrad{
  0%  {background-position:0% 0%}
  50% {background-position:100% 50%}
  100%{background-position:30% 100%}
}
#splash.out{opacity:0;transform:translateY(-20px);pointer-events:none}
.splash-logo{
  width:72px;height:72px;border-radius:50%;
  background:linear-gradient(135deg,var(--sage2),var(--sage));
  display:flex;align-items:center;justify-content:center;
  font-size:32px;margin-bottom:32px;
  box-shadow:0 0 0 12px rgba(168,196,160,.15),0 0 0 24px rgba(168,196,160,.07);
  animation:pulse 3s ease-in-out infinite;
}
@keyframes pulse{0%,100%{box-shadow:0 0 0 12px rgba(168,196,160,.15),0 0 0 24px rgba(168,196,160,.07)}50%{box-shadow:0 0 0 16px rgba(168,196,160,.2),0 0 0 32px rgba(168,196,160,.1)}}
.splash-title{font-family:var(--font-display);font-size:48px;font-weight:500;color:#fff;letter-spacing:-.5px;text-align:center;margin-bottom:8px}
.splash-sub{font-size:14px;color:rgba(255,255,255,.5);text-align:center;letter-spacing:.5px;text-transform:uppercase;margin-bottom:48px}
.splash-card{
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  border-radius:var(--r);padding:24px;width:100%;max-width:320px;margin-bottom:32px;
  backdrop-filter:blur(10px);
}
.splash-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.splash-row:last-child{border-bottom:none;padding-bottom:0}
.splash-row-l{font-size:13px;color:rgba(255,255,255,.5)}
.splash-row-r{font-size:15px;font-weight:600;color:#fff}
.splash-row-r.green{color:var(--sage2)}
.splash-btn{
  width:100%;max-width:320px;padding:18px;
  background:linear-gradient(135deg,var(--sage2),var(--sage));
  color:var(--forest);font-size:16px;font-weight:600;
  border-radius:99px;letter-spacing:.2px;
  box-shadow:0 8px 24px rgba(107,155,118,.4);
  transition:transform .15s,box-shadow .15s;
}
.splash-btn:active{transform:scale(.97);box-shadow:0 4px 12px rgba(107,155,118,.3)}
.splash-nutriz{margin-top:20px;font-size:12px;color:rgba(255,255,255,.3);text-align:center}

/* ── APP SHELL ── */
#app{max-width:430px;margin:0 auto;min-height:100vh;display:none;flex-direction:column}
#app.visible{display:flex}

/* ── HEADER ── */
.hdr{
  background:rgba(247,243,237,.88);
  backdrop-filter:saturate(160%) blur(20px);
  -webkit-backdrop-filter:saturate(160%) blur(20px);
  border-bottom:1px solid var(--line);
  padding:calc(env(safe-area-inset-top,0px) + 14px) 20px 14px;
  position:sticky;top:0;z-index:50;
}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.hdr-brand{display:flex;align-items:center;gap:10px}
.hdr-dot{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--sage),var(--forest));display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.hdr-name{font-family:var(--font-display);font-size:20px;font-weight:500;color:var(--forest);letter-spacing:-.2px}
.hdr-date{font-size:11px;color:var(--light);margin-top:1px;letter-spacing:.2px}
.hdr-right{text-align:right}
.hdr-kcal{font-family:var(--font-display);font-size:30px;font-weight:500;letter-spacing:-1px;line-height:1;font-variant-numeric:tabular-nums}
.hdr-kcal-sub{font-size:11px;color:var(--light);margin-top:2px}
.hdr-bars{display:flex;gap:10px}
.hb{flex:1}
.hb-top{display:flex;justify-content:space-between;font-size:10px;color:var(--light);margin-bottom:5px;font-weight:500;letter-spacing:.2px}
.hb-track{height:3px;background:var(--cream3);border-radius:99px;overflow:hidden}
.hb-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* ── BOTTOM NAV ── */
.nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:rgba(247,243,237,.92);
  backdrop-filter:saturate(160%) blur(20px);
  -webkit-backdrop-filter:saturate(160%) blur(20px);
  border-top:1px solid var(--line);
  display:flex;z-index:50;
  padding-bottom:env(safe-area-inset-bottom,0);
}
.nb{flex:1;padding:10px 0 8px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:opacity .15s}
.nb:active{opacity:.6}
.nb-ic{font-size:20px;line-height:1}
.nb-lbl{font-size:10px;font-weight:500;letter-spacing:.2px;transition:color .2s}
.nb.on .nb-lbl{color:var(--forest);font-weight:600}
.nb.off .nb-lbl{color:var(--light)}
.nb.on .nb-ic{filter:none}

/* ── PAGE ── */
.page{
  flex:1;overflow-y:auto;
  padding:20px 16px calc(var(--nav-h) + 20px);
  animation:fadeUp .28s ease forwards;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── HOME PAGE ── */
.home-greeting{padding:4px 0 24px}
.home-hi{font-family:var(--font-display);font-size:36px;font-weight:400;color:var(--forest);letter-spacing:-.5px;font-style:italic}
.home-hi span{font-style:normal;font-weight:600}
.home-sub{font-size:13px;color:var(--mid);margin-top:4px}

/* Calorie Ring */
.ring-wrap{
  background:linear-gradient(145deg,var(--forest),var(--forest2));
  border-radius:24px;padding:28px 24px;margin-bottom:16px;
  position:relative;overflow:hidden;
  box-shadow:0 12px 40px rgba(28,56,41,.25);
}
.ring-wrap::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:160px;height:160px;border-radius:50%;
  background:rgba(168,196,160,.08);
}
.ring-wrap::after{
  content:'';position:absolute;bottom:-60px;left:-20px;
  width:200px;height:200px;border-radius:50%;
  background:rgba(168,196,160,.05);
}
.ring-inner{display:flex;align-items:center;gap:24px;position:relative;z-index:1}
.ring-svg-wrap{flex-shrink:0;position:relative;width:110px;height:110px}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-num{font-family:var(--font-display);font-size:26px;font-weight:600;color:#fff;letter-spacing:-.5px;line-height:1}
.ring-unit{font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.ring-info{flex:1}
.ring-goal{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:12px;letter-spacing:.2px}
.ring-macros{display:flex;flex-direction:column;gap:8px}
.rm{display:flex;align-items:center;gap:8px}
.rm-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.rm-label{font-size:11px;color:rgba(255,255,255,.6);flex:1}
.rm-val{font-size:12px;font-weight:600;color:#fff;font-variant-numeric:tabular-nums}
.rm-track{flex:1;height:3px;background:rgba(255,255,255,.15);border-radius:99px;overflow:hidden}
.rm-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* Quick Actions */
.qa-title{font-size:12px;font-weight:600;color:var(--light);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.qa-card{
  background:#fff;border-radius:var(--r2);padding:16px;
  border:1px solid var(--line);box-shadow:var(--shadow);
  cursor:pointer;transition:transform .15s,box-shadow .15s;
}
.qa-card:active{transform:scale(.97);box-shadow:none}
.qa-card-ic{font-size:24px;margin-bottom:8px}
.qa-card-title{font-size:14px;font-weight:600;color:var(--charcoal);margin-bottom:2px}
.qa-card-sub{font-size:11px;color:var(--light)}

/* Progress Card */
.prog-card{
  background:#fff;border-radius:var(--r);padding:20px;
  border:1px solid var(--line);box-shadow:var(--shadow);margin-bottom:16px;
}
.prog-title{font-family:var(--font-display);font-size:18px;font-weight:500;color:var(--forest);margin-bottom:14px}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.prog-label{font-size:13px;color:var(--mid)}
.prog-bar-track{height:6px;background:var(--cream2);border-radius:99px;overflow:hidden;flex:1;margin:0 12px}
.prog-bar-fill{height:100%;background:linear-gradient(90deg,var(--sage),var(--forest));border-radius:99px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.prog-pct{font-size:12px;font-weight:600;color:var(--forest);font-variant-numeric:tabular-nums;min-width:32px;text-align:right}

/* ── SEZIONI COMUNI ── */
.sec-h{font-size:11px;font-weight:600;color:var(--light);text-transform:uppercase;letter-spacing:.7px;margin:18px 0 8px;padding:0 2px}
.card{background:#fff;border-radius:var(--r);border:1px solid var(--line);box-shadow:var(--shadow);overflow:hidden;margin-bottom:10px}
.row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line2)}
.row:last-child{border-bottom:none}
.row-l{flex:1}
.row-title{font-size:15px;font-weight:500;color:var(--charcoal)}
.row-sub{font-size:12px;color:var(--light);margin-top:2px}
.row-r{font-size:14px;color:var(--mid);font-variant-numeric:tabular-nums}

/* ── DATE STRIP ── */
.dstrip{display:flex;gap:7px;overflow-x:auto;margin-bottom:18px;padding-bottom:2px}
.dp{
  flex-shrink:0;display:flex;flex-direction:column;align-items:center;
  padding:9px 10px;border-radius:var(--r2);min-width:44px;
  cursor:pointer;transition:all .2s;
  background:#fff;border:1px solid var(--line);
}
.dp.on{background:var(--forest);border-color:var(--forest)}
.dp.today:not(.on){border-color:var(--sage)}
.dp-d{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;line-height:1}
.dp-n{font-size:18px;font-weight:600;margin-top:4px;font-variant-numeric:tabular-nums;line-height:1}
.dp.off .dp-d,.dp.off .dp-n{color:var(--light)}
.dp.today:not(.on) .dp-n{color:var(--sage)}
.dp.on .dp-d,.dp.on .dp-n{color:#fff}

/* ── MEAL GROUPS ── */
.mg{background:#fff;border-radius:var(--r);border:1px solid var(--line);overflow:hidden;margin-bottom:10px;box-shadow:var(--shadow)}
.mg-h{display:flex;align-items:center;gap:10px;padding:14px 16px}
.mg-pip{width:4px;height:32px;border-radius:99px;flex-shrink:0}
.mg-name{font-size:14px;font-weight:600;flex:1;color:var(--charcoal)}
.mg-kcal{font-size:13px;color:var(--mid);font-variant-numeric:tabular-nums}
.mi{display:flex;align-items:center;gap:10px;padding:10px 16px;border-top:1px solid var(--line2)}
.mi-info{flex:1}
.mi-n{font-size:14px;font-weight:400;color:var(--charcoal)}
.mi-s{font-size:11px;color:var(--light);margin-top:2px}
.mi-k{font-size:13px;font-weight:600;color:var(--mid);font-variant-numeric:tabular-nums;margin-right:4px}
.mi-del{
  width:26px;height:26px;border-radius:99px;
  background:var(--terra3);color:var(--terra);
  font-size:16px;font-weight:300;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1;
}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:52px 20px}
.e-ic{font-size:48px;margin-bottom:14px;opacity:.6}
.e-t{font-family:var(--font-display);font-size:22px;font-weight:500;color:var(--forest);margin-bottom:6px}
.e-s{font-size:14px;color:var(--light);line-height:1.6}

/* ── PASTO ── */
.ptabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:18px}
.pt{
  flex-shrink:0;padding:8px 16px;border-radius:99px;
  font-size:13px;font-weight:500;letter-spacing:-.1px;
  transition:all .2s;white-space:nowrap;
}
.pt.on{background:var(--forest);color:#fff;font-weight:600}
.pt.off{background:#fff;color:var(--mid);border:1px solid var(--line)}

/* SELECT */
.sel-blk{margin-bottom:14px}
.sel-lbl{font-size:11px;font-weight:600;color:var(--light);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;padding:0 2px}
.sel-wrap{
  background:#fff;border-radius:var(--r2);
  border:1.5px solid var(--line);
  position:relative;overflow:hidden;
  transition:border-color .2s;
}
.sel-wrap.has{border-color:var(--sage)}
.sel-wrap select{width:100%;padding:13px 40px 13px 16px;background:transparent;color:var(--charcoal);font-size:15px}
.sel-wrap select option{background:#fff;color:var(--charcoal)}
.sel-arr{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--light);font-size:12px;pointer-events:none}
.sel-clear{
  width:100%;padding:10px 16px;background:transparent;
  color:var(--terra);font-size:13px;font-weight:500;
  text-align:left;border-top:1px solid var(--line2);
}

/* TOGGLE */
.tgl-row{display:flex;align-items:center;gap:12px;background:#fff;border-radius:var(--r2);padding:14px 16px;border:1.5px solid var(--line);margin-bottom:14px}
.tgl-info{flex:1}
.tgl-lbl{font-size:15px;font-weight:400;color:var(--charcoal)}
.tgl-sub{font-size:12px;color:var(--light);margin-top:2px}
.tgl{width:50px;height:30px;border-radius:99px;position:relative;transition:background .25s;cursor:pointer;flex-shrink:0}
.tgl.on{background:var(--sage)}
.tgl.off{background:var(--cream3)}
.tgl-k{position:absolute;top:3px;width:24px;height:24px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.2);transition:left .25s cubic-bezier(.4,0,.2,1)}
.tgl.on .tgl-k{left:23px}
.tgl.off .tgl-k{left:3px}

/* BANNER */
.banner{border-radius:var(--r2);padding:12px 14px;margin-bottom:14px;font-size:13px;font-weight:400;line-height:1.5}
.bn-green{background:var(--sage3);color:var(--forest);border-left:3px solid var(--sage)}
.bn-terra{background:var(--terra3);color:var(--terra);border-left:3px solid var(--terra)}
.bn-gold{background:var(--gold2);color:#8B6914;border-left:3px solid var(--gold)}

/* RECAP */
.recap{background:var(--forest);border-radius:var(--r);padding:20px;margin-top:16px;box-shadow:var(--shadow2)}
.recap-title{font-size:11px;font-weight:600;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px}
.recap-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.rc{background:rgba(255,255,255,.07);border-radius:var(--r2);padding:12px 4px;text-align:center}
.rc-v{font-family:var(--font-display);font-size:20px;font-weight:500;color:#fff;letter-spacing:-.3px;line-height:1}
.rc-l{font-size:9px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.4px;margin-top:4px}
.recap-items{font-size:12px;color:rgba(255,255,255,.4);line-height:1.7;margin-bottom:14px}
.date-row{display:flex;gap:8px;margin-bottom:14px}
.date-row input[type=date]{flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:var(--r2);padding:12px 14px;font-size:14px;color:#fff}
.date-today{padding:12px 14px;border-radius:var(--r2);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s}
.date-today.on{background:var(--sage);color:var(--forest)}
.date-today.off{background:rgba(255,255,255,.07);color:rgba(255,255,255,.5)}
.btn-add{width:100%;padding:16px;border-radius:var(--r2);background:linear-gradient(135deg,var(--sage2),var(--sage));color:var(--forest);font-size:15px;font-weight:700;letter-spacing:-.1px;transition:opacity .15s}
.btn-add:active{opacity:.8}

/* SPLIT */
.split-box{background:#fff;border-radius:var(--r2);padding:14px 16px;margin-bottom:14px;border:1.5px solid var(--line)}
.split-vals{display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:10px}

/* ── PESO ── */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.sc{background:#fff;border-radius:var(--r);padding:16px 10px;text-align:center;border:1px solid var(--line);box-shadow:var(--shadow)}
.sc-v{font-family:var(--font-display);font-size:26px;font-weight:500;letter-spacing:-.5px;line-height:1}
.sc-l{font-size:11px;color:var(--light);margin-top:4px}
.chart-card{background:#fff;border-radius:var(--r);padding:18px;border:1px solid var(--line);box-shadow:var(--shadow);margin-bottom:16px}
.inp{background:#fff;border:1.5px solid var(--line);border-radius:var(--r2);padding:13px 16px;font-size:15px;color:var(--charcoal);width:100%;transition:border-color .2s}
.inp:focus{border-color:var(--sage)}
.inp::placeholder{color:var(--light)}
.inp-row{display:flex;gap:8px;margin-bottom:10px}
.inp-row .inp{flex:1}
.btn-save{width:100%;padding:15px;border-radius:var(--r2);background:var(--forest);color:#fff;font-size:15px;font-weight:600;transition:opacity .15s;margin-top:4px}
.btn-save:active{opacity:.8}
.btn-ghost{width:100%;padding:13px;border-radius:var(--r2);background:#fff;border:1px solid var(--line);color:var(--forest);font-size:14px;font-weight:600;margin-top:8px}
.peso-del{width:26px;height:26px;border-radius:99px;background:var(--terra3);color:var(--terra);font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── RIEPILOGO SETTIMANALE ── */
.sett-home-card{
  background:#fff;border-radius:var(--r);border:1px solid var(--line);
  box-shadow:var(--shadow);padding:18px 16px;margin-bottom:16px;
}

/* ── IL MIO PIANO ── */
.piano-hero{
  background:linear-gradient(145deg,var(--forest),var(--forest2));
  border-radius:var(--r);padding:24px 20px;margin-bottom:16px;
  box-shadow:var(--shadow2);position:relative;overflow:hidden;
}
.piano-hero::after{
  content:'';position:absolute;top:-30px;right:-30px;
  width:120px;height:120px;border-radius:50%;
  background:rgba(168,196,160,.1);
}
.piano-nutriz{font-size:11px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
.piano-name{font-family:var(--font-display);font-size:28px;font-weight:500;color:#fff;letter-spacing:-.3px;margin-bottom:4px;font-style:italic}
.piano-kcal{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:16px}
.piano-macros{display:flex;gap:8px}
.pm{flex:1;background:rgba(255,255,255,.08);border-radius:10px;padding:10px 6px;text-align:center}
.pm-v{font-size:16px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums}
.pm-l{font-size:9px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.4px;margin-top:3px}

.piano-section{margin-bottom:16px}
.piano-sec-h{
  display:flex;align-items:center;gap:10px;
  font-family:var(--font-display);font-size:19px;font-weight:500;color:var(--forest);
  margin-bottom:10px;letter-spacing:-.2px;
}
.piano-sec-h::after{content:'';flex:1;height:1px;background:var(--cream3)}
.piano-card{background:#fff;border-radius:var(--r);border:1px solid var(--line);overflow:hidden;box-shadow:var(--shadow);margin-bottom:8px}
.piano-cat{
  padding:10px 14px;
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;
  color:var(--forest);background:var(--sage3);
  border-bottom:1px solid var(--cream3);
}
.piano-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--line2)}
.piano-item:last-child{border-bottom:none}
.piano-item-name{flex:1;font-size:14px;color:var(--charcoal)}
.piano-item-g{font-size:12px;font-weight:600;color:var(--sage);background:var(--sage3);padding:2px 8px;border-radius:99px}

.settimana-card{background:#fff;border-radius:var(--r);border:1px solid var(--line);overflow:hidden;box-shadow:var(--shadow);margin-bottom:8px}
.sett-row{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(--line2)}
.sett-row:last-child{border-bottom:none}
.sett-day{font-size:13px;font-weight:700;color:var(--forest);width:80px;flex-shrink:0}
.sett-pasti{flex:1}
.sett-pranzo{font-size:13px;color:var(--charcoal);margin-bottom:2px}
.sett-cena{font-size:12px;color:var(--light)}
.sett-badge{font-size:10px;font-weight:700;background:var(--gold2);color:var(--gold);padding:2px 8px;border-radius:99px;flex-shrink:0}

.note-card{background:var(--cream2);border-radius:var(--r);padding:16px;border:1px solid var(--cream3);margin-bottom:10px}
.note-item{display:flex;align-items:flex-start;gap:10px;padding:6px 0;border-bottom:1px solid var(--cream3)}
.note-item:last-child{border-bottom:none}
.note-dot{width:6px;height:6px;border-radius:50%;background:var(--sage);flex-shrink:0;margin-top:5px}
.note-text{font-size:13px;color:var(--charcoal);line-height:1.5}
.note-text strong{color:var(--forest);font-weight:600}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:calc(var(--nav-h) + 16px);left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--forest);color:#fff;
  padding:12px 22px;border-radius:99px;
  font-size:14px;font-weight:500;
  opacity:0;transition:all .28s cubic-bezier(.4,0,.2,1);
  pointer-events:none;z-index:200;white-space:nowrap;
  box-shadow:0 8px 32px rgba(28,56,41,.3);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── SUMMARY CARD ── */
.sum-card{background:#fff;border-radius:var(--r);border:1px solid var(--line);box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px}
.sum-row{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid var(--line2)}
.sum-row:last-child{border-bottom:none}
.sum-l{flex:1;font-size:15px;font-weight:500}
.sum-r{font-size:14px;font-variant-numeric:tabular-nums;font-weight:500}
</style>

// ── SYNC COMPLETO: prima invia, poi scarica ───────────────────
function sincronizzaCompleto(){
  const url=S.gsUrl;
  if(!url) return;

  // STEP 1: invia i dati locali allo script
  const body=JSON.stringify({action:"sync_all", diario:S.diario, pesi:S.pesi});
  fetch(url,{method:"POST", mode:"no-cors", headers:{"Content-Type":"application/json"}, body})
    .then(()=>{
      // STEP 2: dopo aver inviato, scarica i dati aggiornati
      setTimeout(()=>scaricaDaSheets(), 1500);
    })
    .catch(()=>{
      // Anche se il POST fallisce, prova a scaricare
      scaricaDaSheets();
    });
}

// ── SCARICA DA SHEETS via JSONP ───────────────────────────────
function scaricaDaSheets(){
  const url=S.gsUrl;
  if(!url) return;

  if(window.__gsCallback) delete window.__gsCallback;
  const old=document.getElementById("gs_jsonp");
  if(old) old.remove();

  window.__gsCallback=function(data){
    delete window.__gsCallback;
    const el=document.getElementById("gs_jsonp");
    if(el) el.remove();
    if(data && data.status==="ok"){
      mergeData(data);
    }
  };

  const script=document.createElement("script");
  script.id="gs_jsonp";
  script.src=url+"?callback=__gsCallback&t="+Date.now();
  script.onerror=function(){ delete window.__gsCallback; script.remove(); };
  document.head.appendChild(script);
}

// Alias per i bottoni nelle impostazioni
function loadFromSheets(){ scaricaDaSheets(); }

function mergeData(data){
  if(data.diario && Object.keys(data.diario).length>0){
    const merged={...S.diario};
    for(const [giorno,items] of Object.entries(data.diario)){
      if(!merged[giorno]||items.length>=merged[giorno].length){
        merged[giorno]=items;
      }
    }
    S.diario=merged;
    sv("ng_d7",S.diario);
  }
  if(data.pesi && data.pesi.length>0){
    const map={};
    for(const p of S.pesi) map[p.data]=p;
    for(const p of data.pesi) map[p.data]=p;
    S.pesi=Object.values(map).sort((a,b)=>a.data.localeCompare(b.data));
    sv("ng_p7",S.pesi);
  }
  S.gsStatus="ok";
  S.gsMsg="Sincronizzato "+nowL();
  sv("ng_gs_lastsync",S.gsMsg);
  re();
}

// RING ANIMATION
// ════════════════════════════════════
function animateRing(){
  const m=dayM(td());
  const pct=Math.min(m.k/T.kcal,1);
  let cur=0;
  const target=pct*283;
  const step=()=>{
    cur+=4;if(cur>target)cur=target;
    const el=document.getElementById("ring-path");
    if(el)el.style.strokeDashoffset=283-cur;
    if(cur<target)requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}

function calcItems(){
  const p=S.pasto;const items=[];
  const add=(it,qty)=>{if(it)items.push({...it,qty:qty||it.g,gb:it.g||1})};
  if(p.tipo==="sgarro"){
    if(p.sgarro==="🎉 Sgarro generico (pasto libero)"){
      items.push({n:"🎉 Sgarro generico (pasto libero)",qty:1,gb:1,k:0,c:0,p:0,f:0});
    }else{
      const i=DB.sgarro.find(x=>x.n===p.sgarro);if(i)add(i);
    }
  }else if(p.tipo==="colazione"){
    if(p.col.prot){const i=DB.colProt.find(x=>x.n===p.col.prot);add(i)}
    if(p.col.carbo){const i=DB.colCarbo.find(x=>x.n===p.col.carbo);add(i)}
    if(p.col.cond){const i=DB.colCond.find(x=>x.n===p.col.cond);add(i)}
    if(p.col.bev){const i=DB.colBev.find(x=>x.n===p.col.bev);add(i)}
    if(p.col.frutta){const i=DB.colFrut.find(x=>x.n===p.col.frutta);add(i)}
  }else if(p.tipo==="pranzo"||p.tipo==="cena"){
    const Cb=p.tipo==="pranzo"?DB.carboPranzo:DB.carboCena;
    const Pr=p.tipo==="pranzo"?DB.protPranzo:DB.protCena;
    if(p.carbo){const i=Cb.find(x=>x.n===p.carbo);add(i)}
    if(p.pr1){const i=Pr.find(x=>x.n===p.pr1);if(i){const r=p.pr2?p.split/100:1;add(i,Math.round(i.g*r))}}
    if(p.pr2){const i=Pr.find(x=>x.n===p.pr2);if(i){const r=(100-p.split)/100;add(i,Math.round(i.g*r))}}
    if(p.verd){const i=DB.verdure.find(x=>x.n===p.verd);add(i)}
    // minestrone già include olio e parmigiano
    const isMinestrone=p.carbo&&p.carbo.includes("Minestrone");
    if(p.olio&&!isMinestrone){const o=p.tipo==="pranzo"?{n:"Olio EVO 1 cucchiaio",g:10,k:90,c:0,p:0,f:10}:{n:"Olio EVO 2 cucchiai",g:20,k:180,c:0,p:0,f:20};add(o)}
    if(p.parm&&!isMinestrone){add({n:"Parmigiano grattugiato (10g)",g:10,k:40,c:0,p:3.6,f:3})}
    if(p.grassoExtra){const i=DB.grassiExtra.find(x=>x.n===p.grassoExtra);add(i)}
    if(p.bev){const i=DB.bevPasto.find(x=>x.n===p.bev);add(i)}
    if(p.frutta){const i=DB.fruttaDopo.find(x=>x.n===p.frutta);add(i)}
    if(p.fs){const i=DB.fruttaSecca.find(x=>x.n===p.fs);add(i)}
  }else if(p.tipo==="spuntino"){
    if(p.sp.a){const i=DB.spuntini.find(x=>x.n===p.sp.a);add(i)}
    if(p.sp.b){const i=DB.spuntini.find(x=>x.n===p.sp.b);add(i)}
  }
  return items;
}

function sumI(its){return its.reduce((a,i)=>{const r=i.qty/i.gb;return{k:a.k+(i.k||0)*r,c:a.c+(i.c||0)*r,p:a.p+(i.p||0)*r,f:a.f+(i.f||0)*r}},{k:0,c:0,p:0,f:0})}

function addToDiary(){
  const items=calcItems();
  if(!items.length){toast("⚠️ Seleziona almeno un alimento");return}
  const lbl={colazione:"🌅 Colazione",pranzo:"☀️ Pranzo",cena:"🌙 Cena",spuntino:"🍎 Spuntino",sgarro:"🎉 Sgarro"};
  const key=S.pasto.dataTgt;
  const log=S.diario[key]||[];
  const ora=nowL();
  const ni=items.map(i=>({id:Date.now()+Math.random(),n:i.n,qty:i.qty,gb:i.gb||i.g||1,k:i.k||0,c:i.c||0,p:i.p||0,f:i.f||0,cat:lbl[S.pasto.tipo],ora}));
  S.diario={...S.diario,[key]:[...log,...ni]};sv("ng_d7",S.diario);
  const tipo=S.pasto.tipo;S.pasto=freshP();S.pasto.tipo=tipo;
  toast("✅ Pasto salvato");
  sincronizzaCompleto();
  re();
}

        </div>
      </div>
      <div class="hdr-right">
        <div class="hdr-kcal" style="color:${ov?"var(--terra)":"var(--forest)"}">${r1(m.k)}</div>
        <div class="hdr-kcal-sub">/ ${T.kcal} kcal oggi</div>
        ${S.gsUrl?`<div style="margin-left:10px;font-size:14px" title="${S.gsStatus==='ok'?'Google Sheets connesso':S.gsStatus==='syncing'?'Sync in corso...':S.gsStatus==='error'?'Errore sync':''}">
          ${S.gsStatus==="syncing"?"🟡":S.gsStatus==="error"?"🔴":"🟢"}
        </div>`:""}
      </div>
    </div>
    <div class="hdr-bars">${bars.map(b=>{
      const pct=Math.min(b.v/b.t*100,100);
      const col=b.v>b.t?"var(--terra)":b.col;
      return`<div class="hb"><div class="hb-top"><span>${b.l}</span><span>${r1(b.v)}g</span></div>
        <div class="hb-track"><div class="hb-fill" style="width:${pct}%;background:${col}"></div></div>
      </div>`;
    }).join("")}</div>`;

  const tabs=[
    {k:"home",i:"🏠",l:"Home"},
    {k:"diario",i:"📔",l:"Diario"},
    {k:"pasto",i:"🍽️",l:"Pasto"},
    {k:"piano",i:"📋",l:"Piano"},
    {k:"peso",i:"⚖️",l:"Peso"},
  ];
  document.getElementById("nav").innerHTML=tabs.map(t=>`<button class="nb ${S.tab===t.k?"on":"off"}" onclick="S.tab='${t.k}';re()">
    <span class="nb-ic">${t.i}</span><span class="nb-lbl">${t.l}</span>
  </button>`).join("");

  const pages={home:rHome,diario:rDiario,pasto:rPasto,piano:rPiano,peso:rPeso};
  document.getElementById("page").innerHTML=(pages[S.tab]||rHome)();

  if(S.tab==="home")setTimeout(animateRing,100);
  if(S.showSettings){
    const overlay=document.createElement("div");
    overlay.id="settings-overlay";
    overlay.innerHTML=rSettings();
    document.body.appendChild(overlay);
  }else{
    const old=document.getElementById("settings-overlay");
    if(old)old.remove();
  }
}

// RIEPILOGO SETTIMANALE (HOME)
// ════════════════════════════════════
function rSettimanaHome(){
  // Calcola gli ultimi 7 giorni
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    days.push(d.toISOString().split("T")[0]);
  }

  const dati=days.map(d=>{
    const m=dayM(d);
    const log=S.diario[d]||[];
    const hasSgarro=log.some(i=>i.cat==="🎉 Sgarro");
    const registrato=log.length>0;
    return{d,k:m.k,c:m.c,p:m.p,f:m.f,sgarro:hasSgarro,registrato};
  });

  const registrati=dati.filter(d=>d.registrato);
  const nReg=registrati.length;
  const nSgarro=dati.filter(d=>d.sgarro).length;
  const mediaKcal=nReg>0?r1(registrati.reduce((a,d)=>a+d.k,0)/nReg):0;
  const mediaProt=nReg>0?r1(registrati.reduce((a,d)=>a+d.p,0)/nReg):0;

  // Giorni con proteine basse (sotto 60g) tra i registrati
  const protBasse=registrati.filter(d=>d.p<60);

  // Analisi automatica
  const insights=[];
  if(nReg===0){
    insights.push({c:"mid",t:"Nessun dato questa settimana — inizia a registrare!"});
  }else{
    if(mediaKcal<T.kcal-100) insights.push({c:"gold",t:`Media kcal ${mediaKcal} — leggermente sotto il target (${T.kcal})`});
    else if(mediaKcal>T.kcal+100) insights.push({c:"terra",t:`Media kcal ${mediaKcal} — sopra il target di ${r1(mediaKcal-T.kcal)} kcal`});
    else insights.push({c:"sage",t:`Media kcal ${mediaKcal} — sei in target ✓`});

    if(protBasse.length>0){
      const gg=protBasse.map(d=>new Date(d.d+"T12:00:00").toLocaleDateString("it-IT",{weekday:"short"})).join(", ");
      insights.push({c:"gold",t:`Proteine basse (sotto 60g): ${gg}`});
    }else if(nReg>=3){
      insights.push({c:"sage",t:`Proteine OK tutta la settimana (media ${mediaProt}g)`});
    }

    if(nSgarro>1) insights.push({c:"terra",t:`${nSgarro} sgarri questa settimana — il piano ne prevede 1`});
    else if(nSgarro===1) insights.push({c:"mid",t:`1 sgarro registrato — nei limiti del piano`});

    const nNonReg=7-nReg;
    if(nNonReg>=3) insights.push({c:"gold",t:`${nNonReg} giorni non registrati — prova a essere più costante`});
    else if(nNonReg===0) insights.push({c:"sage",t:`Settimana completa — tutti i giorni registrati ✓`});
  }

  const colMap={sage:"var(--sage)",terra:"var(--terra)",gold:"var(--gold)",mid:"var(--light)"};
  const bgMap={sage:"var(--sage3)",terra:"var(--terra3)",gold:"var(--gold2)",mid:"var(--cream2)"};

  // Mini grafico kcal 7 giorni
  const maxK=Math.max(...dati.map(d=>d.k),T.kcal,200);
  const barW=100/7;

  const giornoLbl=d=>new Date(d+"T12:00:00").toLocaleDateString("it-IT",{weekday:"short"}).substring(0,3);

  return`
  <div style="margin-top:4px">
    <div class="qa-title">Questa settimana</div>
    <div class="sett-home-card">

      <!-- Grafico a barre kcal -->
      <div style="margin-bottom:14px">
        <div style="font-size:11px;color:var(--light);margin-bottom:8px;font-weight:500">Calorie giornaliere</div>
        <div style="display:flex;align-items:flex-end;gap:4px;height:60px;position:relative">
          <!-- linea target -->
          <div style="position:absolute;left:0;right:0;bottom:${(T.kcal/maxK)*60}px;border-top:1.5px dashed var(--sage2);z-index:1"></div>
          ${dati.map(d=>{
            const h=d.registrato?Math.max((d.k/maxK)*52,3):3;
            const isOggi=d.d===td();
            const col=d.sgarro?"var(--terra2)":d.k>T.kcal+100?"var(--terra)":d.k>T.kcal-100&&d.k>0?"var(--sage)":"var(--cream3)";
            return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
              <div style="width:100%;height:${h}px;background:${col};border-radius:4px 4px 0 0;position:relative;z-index:2;${isOggi?"border:2px solid var(--forest);":""}"></div>
              <div style="font-size:8px;color:${isOggi?"var(--forest)":"var(--light)"};font-weight:${isOggi?700:400}">${giornoLbl(d.d)}</div>
            </div>`;
          }).join("")}
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:var(--light)">
          <span>0</span>
          <span style="color:var(--sage)">— ${T.kcal} target</span>
          <span>${maxK}</span>
        </div>
      </div>

      <!-- Stats mini -->
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px">
        ${[
          {l:"Media kcal",v:mediaKcal||"—",c:mediaKcal>T.kcal+100?"var(--terra)":mediaKcal>0&&mediaKcal>=T.kcal-100?"var(--sage)":"var(--gold)"},
          {l:"Media prot",v:mediaProt?(mediaProt+"g"):"—",c:mediaProt>=70?"var(--sage)":mediaProt>0?"var(--gold)":"var(--light)"},
          {l:"Giorni reg.",v:nReg+"/7",c:nReg>=5?"var(--sage)":nReg>=3?"var(--gold)":"var(--terra)"},
          {l:"Sgarri",v:nSgarro,c:nSgarro<=1?"var(--sage)":"var(--terra)"},
        ].map(s=>`<div style="background:var(--cream2);border-radius:10px;padding:10px 6px;text-align:center">
          <div style="font-size:17px;font-weight:700;color:${s.c};font-family:var(--font-display);line-height:1">${s.v}</div>
          <div style="font-size:9px;color:var(--light);margin-top:3px;line-height:1.2">${s.l}</div>
        </div>`).join("")}
      </div>

      <!-- Insights automatici -->
      <div style="display:flex;flex-direction:column;gap:6px">
        ${insights.map(i=>`<div style="display:flex;align-items:flex-start;gap:8px;background:${bgMap[i.c]};border-radius:10px;padding:10px 12px">
          <div style="width:5px;height:5px;border-radius:50%;background:${colMap[i.c]};flex-shrink:0;margin-top:5px"></div>
          <div style="font-size:12px;color:var(--charcoal);line-height:1.5">${i.t}</div>
        </div>`).join("")}
      </div>

      <!-- Export button -->
      ${nReg>0?`<button class="btn-ghost" style="margin-top:12px;font-size:13px" onclick="exportCSV()">📥 Esporta settimana per la nutrizionista</button>`:""}
    </div>
  </div>`;
}

// DIARIO
// ════════════════════════════════════
function rDiario(){
  const m=dayM(S.dData);const log=S.diario[S.dData]||[];
  const isT=S.dData===td();
  const days=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(d.toISOString().split("T")[0])}
  const strip=`<div class="dstrip">${days.map(d=>{
    const iT=d===td();const on=d===S.dData;
    const dt=new Date(d+"T12:00:00");
    const dn=dt.toLocaleDateString("it-IT",{weekday:"short"}).substring(0,3).toUpperCase();
    return`<div class="dp ${on?"on":iT?"today":"off"}" onclick="S.dData='${d}';re()">
      <span class="dp-d">${iT?"HOG":dn}</span>
      <span class="dp-n">${dt.getDate()}</span>
    </div>`;
  }).join("")}</div>`;

  const iR=(v,t)=>v>=(t-10)&&v<=(t+10);const oV=(v,t)=>v>t+10;
  const sumCard=`<div class="sum-card">
    <div class="sum-row">
      <span class="sum-l" style="font-weight:600;font-family:var(--font-display);font-size:17px">${isT?"Oggi":fmtD(S.dData)}</span>
      <span class="sum-r" style="font-family:var(--font-display);font-size:22px;color:${m.k>T.kcal?"var(--terra)":"var(--forest)"}">${r1(m.k)} <span style="font-size:12px;color:var(--light);font-family:var(--font)">kcal</span></span>
    </div>
    ${[{l:"Carboidrati",v:m.c,t:T.c},{l:"Proteine",v:m.p,t:T.p},{l:"Grassi",v:m.f,t:T.f}].map(b=>{
      const ir=iR(b.v,b.t);const ov=oV(b.v,b.t);
      return`<div class="sum-row"><span class="sum-l">${b.l}</span>
        <span class="sum-r" style="color:${ir?"var(--sage)":ov?"var(--terra)":"var(--mid)"}">${r1(b.v)}g / ${b.t}g${ir?" ✓":""}</span>
      </div>`;
    }).join("")}
  </div>`;

  const ORDER=["🌅 Colazione","🍎 Spuntino","☀️ Pranzo","🌙 Cena","🎉 Sgarro","—"];
  const COLS={"🌅 Colazione":["#B8914A","#F0DEB4"],"🍎 Spuntino":["#9B6B9B","#E8D4E8"],"☀️ Pranzo":["#4A8CB8","#D4E6F5"],"🌙 Cena":["#1C3829","#D4E6CF"],"🎉 Sgarro":["#C4714A","#F5DDD4"],"—":["#9E9B94","#E2DBD0"]};
  const grps={};for(const item of log){const cat=item.cat||"—";if(!grps[cat])grps[cat]=[];grps[cat].push(item)}

  let mHtml="";
  if(!log.length){
    mHtml=`<div class="empty"><div class="e-ic">🥗</div><div class="e-t">Nessun pasto</div><div class="e-s">${isT?"Vai su Pasto per iniziare a registrare la giornata":"Nessun dato per questo giorno"}</div></div>`;
  }else{
    for(const cat of ORDER){
      if(!grps[cat])continue;
      const its=grps[cat];
      const tot=its.reduce((a,i)=>{const r=i.qty/i.gb;return{k:a.k+i.k*r}},{k:0});
      const [col,bg]=COLS[cat]||COLS["—"];
      mHtml+=`<div class="mg">
        <div class="mg-h">
          <div class="mg-pip" style="background:${col}"></div>
          <span class="mg-name" style="color:${col}">${cat}</span>
          <span class="mg-kcal">${r1(tot.k)} kcal</span>
        </div>
        ${its.map(i=>{const r=i.qty/i.gb;return`<div class="mi">
          <div class="mi-info">
            <div class="mi-n">${i.n}</div>
            <div class="mi-s">${i.qty}g · C${r1(i.c*r)} P${r1(i.p*r)} G${r1(i.f*r)} · ${i.ora}</div>
          </div>
          <span class="mi-k">${r1(i.k*r)}</span>
          <button class="mi-del" onclick="rmItem('${i.id}')">−</button>
        </div>`}).join("")}
      </div>`;
    }
    mHtml+=`<button class="btn-ghost" onclick="exportCSV()" style="margin-top:8px">📥 Esporta CSV per la nutrizionista</button>`;
  }
  return strip+sumCard+mHtml;
}

// PASTO
// ════════════════════════════════════
function rPasto(){
  const p=S.pasto;
  const tipos=[{k:"colazione",l:"Colazione"},{k:"pranzo",l:"Pranzo"},{k:"cena",l:"Cena"},{k:"spuntino",l:"Spuntino"},{k:"sgarro",l:"🎉 Sgarro"}];
  const ptabs=`<div class="ptabs">${tipos.map(t=>`<button class="pt ${p.tipo===t.k?"on":"off"}" onclick="S.pasto.tipo='${t.k}';re()">${t.l}</button>`).join("")}</div>`;

  let form="";
  if(p.tipo==="sgarro"){
    const isGenerico=p.sgarro==="🎉 Sgarro generico (pasto libero)";
    form=`<div class="banner bn-terra">🎉 <strong>Pasto libero settimanale</strong> — Un pasto libero a settimana è consentito. Registralo per restare consapevole.</div>
    ${rSel("sg",DB.sgarro,p.sgarro,"ALIMENTO","Scegli il tuo sgarro","t")}
    ${isGenerico?'<div class="banner bn-gold">📝 Sgarro generico registrato — calorie non calcolate nel totale</div>':''}`;
  }else if(p.tipo==="colazione"){
    form=`<div class="banner bn-green">💡 Combina proteina + carboidrato + bevanda. Cornetto o pane+burro → elimina frutto e noci dal pranzo</div>
      ${rSel("cp",DB.colProt,p.col.prot,"PROTEINA","Aggiungi proteina")}
      ${rSel("cc",DB.colCarbo,p.col.carbo,"CARBOIDRATO","Aggiungi carboidrato")}
      ${rSel("cd",DB.colCond,p.col.cond,"CONDIMENTO","Aggiungi condimento")}
      ${rSel("cb",DB.colBev,p.col.bev,"BEVANDA","Aggiungi bevanda")}
      ${rSel("cf",DB.colFrut,p.col.frutta,"FRUTTA","Aggiungi frutta")}`;
  }else if(p.tipo==="pranzo"||p.tipo==="cena"){
    const Cb=p.tipo==="pranzo"?DB.carboPranzo:DB.carboCena;
    const Pr=p.tipo==="pranzo"?DB.protPranzo:DB.protCena;
    let split="";
    if(p.pr1&&p.pr2){
      const i1=Pr.find(x=>x.n===p.pr1);const i2=Pr.find(x=>x.n===p.pr2);
      split=`<div class="split-box">
        <div style="font-size:11px;font-weight:600;color:var(--light);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Dividi le dosi</div>
        <div class="split-vals"><span style="color:var(--forest)">${p.split}% → ${Math.round((i1?.g||0)*p.split/100)}g</span><span style="color:var(--terra)">${100-p.split}% → ${Math.round((i2?.g||0)*(100-p.split)/100)}g</span></div>
        <input type="range" min="10" max="90" value="${p.split}" oninput="S.pasto.split=+this.value;re()">
      </div>`;
    }
    form=`${rSel("prc",Cb,p.carbo,"CARBOIDRATO","Scegli carboidrato")}
      ${p.carbo&&p.carbo.includes("Minestrone")?'<div class="banner bn-green">🍲 <strong>Pasto completo</strong> — Il minestrone include già olio e parmigiano. Aggiungi solo frutto + noci.</div>':""}
      ${rSel("prp1",Pr,p.pr1,"PROTEINA PRINCIPALE","Scegli proteina","t")}

      </div>
      <div class="tgl-row">
        <div class="tgl-info"><div class="tgl-lbl">🧀 Parmigiano Reggiano grattugiato</div><div class="tgl-sub">${p.carbo&&p.carbo.includes("Minestrone")?"2 cucchiai · già incluso nel minestrone":"1 cucchiaio · 10g · 40 kcal"}</div></div>
        <div class="tgl ${p.parm&&!(p.carbo&&p.carbo.includes("Minestrone"))?"on":"off"}" onclick="${p.carbo&&p.carbo.includes("Minestrone")?"void(0)":"S.pasto.parm=!S.pasto.parm;re()"}"><div class="tgl-k"></div></div>
      </div>
      ${rSel("prge",DB.grassiExtra,p.grassoExtra,"GRASSO EXTRA (avocado, olive…)","Aggiungi grasso extra")}
      ${rSel("prb",DB.bevPasto,p.bev,"BEVANDA (opzionale)","Aggiungi bevanda")}
      ${rSel("prf",DB.fruttaDopo,p.frutta,"FRUTTO DOPO PASTO","Aggiungi frutto")}
      ${rSel("prfs",DB.fruttaSecca,p.fs,"FRUTTA SECCA","Aggiungi frutta secca")}`;
  }else if(p.tipo==="spuntino"){
    form=`<div class="banner bn-green">💡 Dopo pranzo: 1 frutto + 5 noci. Dopo cena: 1 frutto + 3 noci</div>
      ${rSel("spa",DB.spuntini,p.sp.a,"COMPONENTE 1","Scegli snack")}
      ${rSel("spb",DB.spuntini,p.sp.b,"COMPONENTE 2 (opzionale)","Aggiungi secondo snack")}`;
  }

  const items=calcItems();const macro=sumI(items);const has=items.length>0;
  let recap="";
  if(has){
    const fb=()=>{
      if(p.tipo==="sgarro")return`<div class="banner bn-terra">🎉 Sgarro registrato — consideralo nel totale giornaliero</div>`;
      if(macro.p<10)return`<div class="banner bn-gold">⚠️ Proteine basse per questo pasto</div>`;
      if(macro.k>900)return`<div class="banner bn-terra">⚠️ Pasto molto calorico</div>`;
      return`<div class="banner bn-green">✓ In linea con il piano</div>`;
    };
    recap=`<div class="recap">
      <div class="recap-title">Riepilogo pasto</div>
      <div class="recap-grid">
        ${[{l:"kcal",v:r1(macro.k),c:"#fff"},{l:"carbo",v:r1(macro.c)+"g",c:"#F0DEB4"},{l:"prot",v:r1(macro.p)+"g",c:"#D4E6CF"},{l:"grassi",v:r1(macro.f)+"g",c:"#F5DDD4"}].map(x=>`<div class="rc"><div class="rc-v" style="color:${x.c}">${x.v}</div><div class="rc-l">${x.l}</div></div>`).join("")}
      </div>
      <div class="recap-items">${items.map(i=>i.n).join(" · ")}</div>
      ${fb()}
      <div class="date-row">
        <input type="date" value="${p.dataTgt}" max="${td()}" onchange="S.pasto.dataTgt=this.value;re()">
        <button class="date-today ${p.dataTgt===td()?"on":"off"}" onclick="S.pasto.dataTgt='${td()}';re()">Oggi</button>
      </div>
      <button class="btn-add" onclick="addToDiary()">Aggiungi al Diario</button>
    </div>`;
  }
  return ptabs+`<div style="background:var(--cream2);border-radius:var(--r);padding:16px;margin-bottom:4px">${form}</div>`+recap;
}

// PESO
// ════════════════════════════════════
function rPeso(){
  const pesi=S.pesi;const last=pesi.length?pesi[pesi.length-1]:null;
  const diff=pesi.length>1?r1(pesi[pesi.length-1].kg-75.1):0;
  const rimasto=last?r1(last.kg-65):null;

  const stats=`<div class="stats">
    ${last?`<div class="sc"><div class="sc-v" style="color:var(--forest)">${last.kg}</div><div class="sc-l">kg attuale</div></div>`:""}
    <div class="sc"><div class="sc-v" style="color:${diff<=0?"var(--sage)":"var(--terra)"}">${diff<=0?diff:"+"+diff}</div><div class="sc-l">da 75.1 kg</div></div>
    ${rimasto!==null?`<div class="sc"><div class="sc-v" style="color:${rimasto<=0?"var(--sage)":"var(--gold)"}">${rimasto<=0?"🎯":rimasto}</div><div class="sc-l">${rimasto<=0?"Obiettivo!":"al goal"}</div></div>`:""}
  </div>`;

  let chart="";
  if(pesi.length>=2){
    const W=340,H=120,pt=20,pb=20,pl=30,pr=16;
    const cW=W-pl-pr,cH=H-pt-pb;
    const ks=pesi.map(p=>p.kg);const mn=Math.min(...ks,65)-1,mx=Math.max(...ks)+1;
    const xP=i=>pl+i/Math.max(pesi.length-1,1)*cW;
    const yP=k=>pt+(mx-k)/(mx-mn)*cH;
    const pts=pesi.map((p,i)=>`${xP(i)},${yP(p.kg)}`).join(" L");
    chart=`<div class="chart-card">
      <div style="font-size:13px;font-weight:600;color:var(--forest);margin-bottom:12px">Andamento peso</div>
      <svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible">
        <defs>
          <linearGradient id="pg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#6B9B76" stop-opacity=".2"/>
            <stop offset="100%" stop-color="#6B9B76" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <line x1="${pl}" y1="${yP(65)}" x2="${W-pr}" y2="${yP(65)}" stroke="var(--sage2)" stroke-width="1.5" stroke-dasharray="5,4"/>
        <text x="${W-pr+4}" y="${yP(65)+4}" fill="var(--sage)" font-size="9" font-family="-apple-system,sans-serif">65 🎯</text>
        <path d="M${xP(0)},${pt+cH} L${pts} L${xP(pesi.length-1)},${pt+cH} Z" fill="url(#pg)"/>
        <path d="M${pts}" fill="none" stroke="var(--forest)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        ${pesi.map((p,i)=>`
          <circle cx="${xP(i)}" cy="${yP(p.kg)}" r="5" fill="var(--forest)" stroke="var(--cream)" stroke-width="2"/>
          <text x="${xP(i)}" y="${yP(p.kg)-10}" fill="var(--forest)" font-size="9" text-anchor="middle" font-weight="600" font-family="-apple-system,sans-serif">${p.kg}</text>
          <text x="${xP(i)}" y="${H-4}" fill="var(--light)" font-size="8" text-anchor="middle" font-family="-apple-system,sans-serif">${p.data.slice(5)}</text>
        `).join("")}
      </svg>
    </div>`;
  }

  const form=`<div class="card" style="margin-bottom:16px">
    <div class="row" style="border-bottom:1px solid var(--line2)"><span style="font-size:14px;font-weight:600;color:var(--forest)">Nuova misurazione</span></div>
    <div style="padding:14px 16px">
      <div class="inp-row">
        <input type="date" value="${S.pesoData}" onchange="S.pesoData=this.value" class="inp">
        <input type="number" step=".1" placeholder="kg" value="${S.pesoKg}" oninput="S.pesoKg=this.value" class="inp" style="max-width:90px">
      </div>
      <input placeholder="Nota (es. dopo palestra)" value="${S.pesaNota}" oninput="S.pesaNota=this.value" class="inp" style="margin-bottom:10px">
      <button class="btn-save" onclick="addPeso()">Salva peso</button>
    </div>
  </div>`;

  const storico=`<div style="font-size:11px;font-weight:600;color:var(--light);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px">Storico</div>
  <div class="card">${[...pesi].reverse().map(p=>`<div class="row">
    <div>
      <div class="row-title">${new Date(p.data+"T12:00:00").toLocaleDateString("it-IT",{day:"numeric",month:"short",year:"numeric"})}</div>
      ${p.nota?`<div class="row-sub">${p.nota}</div>`:""}
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-family:var(--font-display);font-size:20px;font-weight:500;color:var(--forest)">${p.kg} kg</span>
      <button class="peso-del" onclick="rmPeso('${p.data}')">−</button>
    </div>
  </div>`).join("")}</div>
  <button class="btn-ghost" style="margin-top:8px" onclick="exportCSV()">📥 Esporta CSV</button>
  <div style="text-align:center;margin-top:24px;padding-top:16px;border-top:1px solid var(--line2)">
    <button style="background:none;font-size:11px;color:var(--cream3);letter-spacing:.3px" onclick="S.showSettings=true;S.gsUrlInput=S.gsUrl||'';re()">
      ${S.gsUrl?`🟢 Google Sheets connesso`:`impostazioni`}
    </button>
  </div>`;

  return stats+chart+form+storico;
}

function rSel(id,items,val,lbl,ph,grp){
  const has=!!val;
  let opts=`<option value="">— ${ph} —</option>`;
  if(grp){
    const g={};items.forEach(i=>{const k=i[grp]||"Altro";if(!g[k])g[k]=[];g[k].push(i)});
    for(const[k,arr]of Object.entries(g)){opts+=`<optgroup label="${k}">`+arr.map(i=>`<option value="${xe(i.n)}"${i.n===val?"selected":""}>${i.n}</option>`).join("")+"</optgroup>";}
  }else{
    opts+=items.map(i=>`<option value="${xe(i.n)}"${i.n===val?"selected":""}>${i.n}</option>`).join("");
  }
  return`<div class="sel-blk">
    <div class="sel-lbl">${lbl}</div>
    <div class="sel-wrap${has?" has":""}">
      <select id="${id}" onchange="hs('${id}',this.value)">${opts}</select>
      <span class="sel-arr">›</span>
      ${has?`<button class="sel-clear" onclick="hs('${id}','')">✕  Rimuovi "${val.split(" (")[0].substring(0,30)}"</button>`:""}
    </div>
  </div>`;
}

function xe(s){return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;")}

function hs(id,val){
  const p=S.pasto;const v=val||null;
  const m={
    sg:()=>p.sgarro=v,
    cp:()=>p.col.prot=v,cc:()=>p.col.carbo=v,cd:()=>p.col.cond=v,cb:()=>p.col.bev=v,cf:()=>p.col.frutta=v,
    prc:()=>p.carbo=v,prp1:()=>p.pr1=v,prp2:()=>p.pr2=v,
    prv:()=>p.verd=v,prb:()=>p.bev=v,prf:()=>p.frutta=v,prfs:()=>p.fs=v,
    prge:()=>p.grassoExtra=v,
    spa:()=>p.sp.a=v,spb:()=>p.sp.b=v,
  };
  if(m[id])m[id]();re();
}

function rmItem(id){
  const key=S.dData;
  S.diario[key]=(S.diario[key]||[]).filter(i=>String(i.id)!==String(id));
  sv("ng_d7",S.diario);re();
}

function addPeso(){
  const kg=parseFloat(S.pesoKg);
  if(isNaN(kg)||kg<30||kg>300){toast("⚠️ Peso non valido");return}
  const data=S.pesoData||td();
  const pesi=S.pesi.filter(p=>p.data!==data);
  pesi.push({data,kg,nota:S.pesaNota||""});
  pesi.sort((a,b)=>a.data.localeCompare(b.data));
  S.pesi=pesi;S.pesoKg="";S.pesaNota="";sv("ng_p7",S.pesi);
  toast(`✅ ${kg} kg salvato`);
  sincronizzaCompleto();
  re();
}

function rmPeso(data){S.pesi=S.pesi.filter(p=>p.data!==data);sv("ng_p7",S.pesi);re()}

// GOOGLE SHEETS SYNC
// ════════════════════════════════════
function syncToSheets(action){
  const url=S.gsUrl;
  if(!url)return;
  S.gsStatus="syncing";re();
  const body={action:action||"sync_all",diario:S.diario,pesi:S.pesi};
  fetch(url,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)})
    .then(()=>{
      S.gsStatus="ok";
      S.gsMsg="Sincronizzato "+nowL();
      sv("ng_gs_lastsync",S.gsMsg);
      re();setTimeout(()=>{S.gsStatus="idle";re();},3000);
    }).catch(()=>{
      S.gsStatus="error";S.gsMsg="Errore — controlla l'URL";
      re();setTimeout(()=>{S.gsStatus="idle";re();},4000);
    });
}

function saveGsUrl(){
  // Legge direttamente dal DOM per evitare problemi di stato
  const el=document.getElementById("gs-url-input");
  const v=el?el.value.trim():(S.gsUrlInput||"").trim();
  if(!v||!v.startsWith("https://")){toast("⚠️ Incolla un URL valido (inizia con https://)");return;}
  S.gsUrl=v;sv("ng_gs_url",v);S.showSettings=false;
  toast("✅ URL salvato!");
  syncToSheets("sync_all");re();
}

      <div style="font-size:20px">${dot}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600;color:var(--charcoal)">${st==="ok"?"Sincronizzato ✓":st==="syncing"?"In corso...":st==="error"?"Errore":"Connesso"}</div>
        <div style="font-size:10px;color:var(--light);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${S.gsMsg||lastSync||"Pronto al sync"}</div>
      </div>
      ${st!=="syncing"?`
        <div style="display:flex;gap:8px;margin-top:10px">
          <button style="flex:1;background:var(--forest);color:#fff;border-radius:99px;padding:8px 14px;font-size:12px;font-weight:600" onclick="syncToSheets('sync_all')">↑ Invia a Sheets</button>
          <button style="flex:1;background:var(--sage);color:#fff;border-radius:99px;padding:8px 14px;font-size:12px;font-weight:600" onclick="loadFromSheets();toast('⏳ Caricamento...')">↓ Carica da Sheets</button>
        </div>`:`<div style="font-size:12px;color:var(--gold);margin-top:6px">⏳ In corso...</div>`}
    </div>`:""}

    <div style="margin-bottom:14px">
      <div style="font-size:11px;font-weight:700;color:var(--mid);margin-bottom:8px;text-transform:uppercase;letter-spacing:.6px">URL Google Apps Script</div>
      <textarea
        id="gs-url-input"
        style="width:100%;background:#fff;border:2px solid var(--sage2);border-radius:12px;padding:14px;font-size:12px;color:var(--charcoal);resize:none;height:80px;line-height:1.6;font-family:monospace"
        placeholder="Incolla qui: https://script.google.com/macros/s/.../exec"
      >${S.gsUrl||""}</textarea>
    </div>

    <button
      style="width:100%;padding:16px;border-radius:14px;background:var(--forest);color:#fff;font-size:15px;font-weight:600;margin-bottom:16px;letter-spacing:.2px"
      onclick="saveGsUrl()">
      ${S.gsUrl?"💾 Aggiorna e sincronizza":"🔗 Collega Google Sheets"}
    </button>

    <details style="margin-bottom:14px">
      <summary style="font-size:13px;font-weight:600;color:var(--forest);cursor:pointer;padding:12px 16px;background:var(--sage3);border-radius:12px;list-style:none">
        📖 Come si configura (guida rapida)
      </summary>
      <div style="background:var(--sage3);border-radius:0 0 12px 12px;padding:12px 16px 16px">
        ${["Vai su <b>script.google.com</b> → Nuovo progetto","Cancella tutto e incolla il codice del file <b>NutriGabri_AppScript.js</b>","Salva con Ctrl+S","<b>Deploy → Nuova distribuzione</b>","Tipo: Web App · Esegui come: Me · Accesso: <b>Chiunque</b>","Autorizza → copia l'URL → incollalo qui sopra"].map((t,i)=>`
          <div style="display:flex;gap:10px;margin-top:10px;align-items:flex-start">
            <div style="width:20px;height:20px;min-width:20px;border-radius:50%;background:var(--forest);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center">${i+1}</div>
            <div style="font-size:12px;color:var(--forest);line-height:1.5">${t}</div>
          </div>`).join("")}
      </div>
    </details>

    ${S.gsUrl?`<button style="width:100%;padding:13px;border-radius:12px;background:var(--terra3);color:var(--terra);font-size:13px;font-weight:600" onclick="S.gsUrl='';S.gsMsg='';sv('ng_gs_url','');sv('ng_gs_lastsync','');re();toast('Disconnesso')">🔌 Disconnetti Google Sheets</button>`:""}
  </div>`;
}

function exportCSV(){
  const r=[["Data","Giorno","Pasto","Alimento","g","Kcal","Carbo","Prot","Grassi","Ora"]];
  for(const d of Object.keys(S.diario).sort()){
    const log=S.diario[d]||[];if(!log.length)continue;
    const g=new Date(d+"T12:00:00").toLocaleDateString("it-IT",{weekday:"long"});
    for(const i of log){const x=i.qty/i.gb;r.push([d,g,i.cat||"-",i.n,i.qty,r1(i.k*x),r1(i.c*x),r1(i.p*x),r1(i.f*x),i.ora||"-"])}
    const tot=log.reduce((a,i)=>{const x=i.qty/i.gb;return{k:a.k+i.k*x,c:a.c+i.c*x,p:a.p+i.p*x,f:a.f+i.f*x}},{k:0,c:0,p:0,f:0});
    r.push([d,g,"▶ TOT","","",r1(tot.k),r1(tot.c),r1(tot.p),r1(tot.f),""]);r.push([]);
  }
  r.push([]);r.push(["PESO"]);r.push(["Data","Kg","Nota"]);
  for(const p of S.pesi)r.push([p.data,p.kg,p.nota||""]);
  const csv="\uFEFF"+r.map(x=>x.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(";")).join("\n");
  const b=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const u=URL.createObjectURL(b);const a=document.createElement("a");
  a.href=u;a.download=`NutriGabri_${td()}.csv`;a.click();URL.revokeObjectURL(u);
}
</script>
