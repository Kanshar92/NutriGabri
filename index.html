  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
    body{background:#0d1821;color:#e2e8f0;font-family:'DM Sans',sans-serif;overscroll-behavior:none}
    ::-webkit-scrollbar{display:none}
    input,select,button{font-family:'DM Sans',sans-serif}
    input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:99px;outline:none;background:#1d3045}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#00e5b4;cursor:pointer}
    input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1)}
    select{-webkit-appearance:none;appearance:none}
    .tab-content{display:none}
    .tab-content.active{display:block}
    .toast{display:none;position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#4ade80;color:#0d1821;padding:12px 24px;border-radius:12px;font-weight:800;font-size:14px;z-index:100;box-shadow:0 0 20px #4ade8055;width:90%;max-width:400px;text-align:center}
    .toast.show{display:block}
    .group-header{cursor:pointer;user-select:none}
    .group-items{display:none}
    .group-items.open{display:block}
  </style>
</head>

function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

let STATE={
  tab:"diario",
  diario:load("ng_diario_v4",{}),
  pesi:load("ng_pesi_v4",[{data:"2025-09-14",kg:75.1,nota:"Inizio piano"},{data:"2026-01-15",kg:70.5,nota:""},{data:"2026-03-05",kg:65.6,nota:"Bilancia Fitdays"}]),
  frigo:load("ng_frigo_v4",[]),
  pasto:{tipo:"pranzo",carbo:null,prot1:null,prot2:null,split:70,verd:null,olio:true,bevanda:null,frutta:null,fruttaSecca:null,colComp:[null,null,null,null],spuntComp:[null,null],aperDrink1:null,aperDrink2:null,aperStuz:null,dataTarget:todayStr()},
  frigoSearch:"",frigoFiltro:"tutti",
  pesoInput:"",pesoData:todayStr(),pesaNota:"",
  diarioDate:todayStr()
};

function todayStr(){return new Date().toISOString().split("T")[0]}
function r2(n){return Math.round(n*10)/10}
function nowLabel(){const d=new Date();return d.toLocaleDateString("it-IT",{day:"numeric",month:"short"})+" "+d.getHours().toString().padStart(2,"0")+":"+d.getMinutes().toString().padStart(2,"0")}
function fmtData(s){if(!s)return "";try{return new Date(s+"T12:00:00").toLocaleDateString("it-IT",{weekday:"short",day:"numeric",month:"short"})}catch{return s}}

function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500)}
function setState(patch){Object.assign(STATE,patch);render()}

// ═══════════════════════════════════════
// MACRO CALC
// ═══════════════════════════════════════
function calcDayMacros(dateStr){
  const log=STATE.diario[dateStr]||[];
  return log.reduce((a,i)=>{const r=i.qty/i.grammiBase;return{kcal:a.kcal+i.kcal*r,carbo:a.carbo+i.carbo*r,proteine:a.proteine+i.proteine*r,grassi:a.grassi+i.grassi*r}},{kcal:0,carbo:0,proteine:0,grassi:0});
}

// ═══════════════════════════════════════
// PASTO CALC
// ═══════════════════════════════════════
function calcPasto(){
  const p=STATE.pasto;
  const items=[];
  const olio10={nome:"Olio EVO 1 cucchiaio",grammi:10,kcal:90,carbo:0,proteine:0,grassi:10,grammiBase:10};
  const olio20={nome:"Olio EVO 2 cucchiai",grammi:20,kcal:180,carbo:0,proteine:0,grassi:20,grammiBase:20};

  if(p.tipo==="colazione"){
    [0,1,2,3].forEach(i=>{if(p.colComp[i]){const f=findItem(p.colComp[i]);if(f)items.push({...f,grammiBase:f.grammi,qty:f.grammi})}});
    if(p.colComp[4]){const f=findItem(p.colComp[4]);if(f)items.push({...f,grammiBase:f.grammi,qty:f.grammi})}
  } else if(p.tipo==="pranzo"||p.tipo==="cena"){
    const carbs=p.tipo==="pranzo"?CARBS_PRANZO:CARBS_CENA;
    const prots=p.tipo==="pranzo"?PROTS_PRANZO:PROTS_CENA;
    if(p.carbo){const f=carbs.find(x=>x.nome===p.carbo);if(f)items.push({...f,grammiBase:f.grammi,qty:f.grammi})}
    if(p.prot1){const f=prots.find(x=>x.nome===p.prot1);if(f){const ratio=p.prot2?p.split/100:1;items.push({...f,grammiBase:f.grammi,qty:Math.round(f.grammi*ratio)})}}
    if(p.prot2){const f=prots.find(x=>x.nome===p.prot2);if(f){const ratio=(100-p.split)/100;items.push({...f,grammiBase:f.grammi,qty:Math.round(f.grammi*ratio)})}}
    if(p.verd){const f=VERDURE.find(x=>x.nome===p.verd);if(f)items.push({...f,grammiBase:f.grammi,qty:f.grammi})}
    if(p.olio)items.push(p.tipo==="pranzo"?{...olio10}:{...olio20});
    if(p.bevanda){const f=BEVANDE_PASTO.find(x=>x.nome===p.bevanda);if(f)items.push({...f,grammiBase:f.grammi,qty:f.grammi})}
    if(p.frutta){const f=FRUTTA_DOPO.find(x=>x.nome===p.frutta);if(f)items.push({...f,grammiBase:f.grammi,qty:f.grammi})}
    if(p.fruttaSecca){const f=FRUTTA_SECCA_DOPO.find(x=>x.nome===p.fruttaSecca);if(f)items.push({...f,grammiBase:f.grammi,qty:f.grammi})}
  } else if(p.tipo==="spuntino"){
    [0,1].forEach(i=>{if(p.spuntComp[i]){const f=SPUNTINI_ALL.find(x=>x.nome===p.spuntComp[i]);if(f)items.push({...f,grammiBase:f.grammi,qty:f.grammi})}});
  } else if(p.tipo==="aperitivo"){
    if(p.aperDrink1){const f=APERITIVO_DRINK.find(x=>x.nome===p.aperDrink1);if(f)items.push({...f,grammiBase:f.grammi,qty:f.grammi})}
    if(p.aperDrink2){const f=APERITIVO_DRINK.find(x=>x.nome===p.aperDrink2);if(f)items.push({...f,grammiBase:f.grammi,qty:f.grammi})}
    if(p.aperStuz){const f=APERITIVO_STUZZICHINI.find(x=>x.nome===p.aperStuz);if(f)items.push({...f,grammiBase:f.grammi,qty:f.grammi})}
  }
  return items;
}

function findItem(nome){
  const all=[...COLAZIONI.proteiche,...COLAZIONI.carboidrati,...COLAZIONI.grassi_dolci,...COLAZIONI.bevande,...COLAZIONI.frutta];
  return all.find(x=>x.nome===nome);
}

function sumMacros(items){
  return items.reduce((a,i)=>{const r=i.qty/i.grammiBase;return{kcal:a.kcal+i.kcal*r,carbo:a.carbo+(i.carbo||0)*r,proteine:a.proteine+(i.proteine||0)*r,grassi:a.grassi+(i.grassi||0)*r}},{kcal:0,carbo:0,proteine:0,grassi:0});
}

function addToDiary(){
  const items=calcPasto();
  if(!items.length){showToast("⚠️ Seleziona almeno un alimento!");return}
  const labels={colazione:"🌅 Colazione",pranzo:"☀️ Pranzo",cena:"🌙 Cena",spuntino:"🍎 Spuntino",aperitivo:"🥂 Aperitivo"};
  const key=STATE.pasto.dataTarget;
  const log=STATE.diario[key]||[];
  const oraLabel=nowLabel();
  const newItems=items.map(i=>({id:Date.now()+Math.random(),nome:i.nome,qty:i.qty,grammiBase:i.grammiBase||i.grammi,kcal:i.kcal,carbo:i.carbo||0,proteine:i.proteine||0,grassi:i.grassi||0,cat:labels[STATE.pasto.tipo],ora:oraLabel}));
  const newDiario={...STATE.diario,[key]:[...log,...newItems]};
  save("ng_diario_v4",newDiario);
  // Reset pasto
  const newP={tipo:STATE.pasto.tipo,carbo:null,prot1:null,prot2:null,split:70,verd:null,olio:true,bevanda:null,frutta:null,fruttaSecca:null,colComp:[null,null,null,null],spuntComp:[null,null],aperDrink1:null,aperDrink2:null,aperStuz:null,dataTarget:STATE.pasto.dataTarget};
  STATE.diario=newDiario;STATE.pasto=newP;
  showToast("✅ Pasto aggiunto al diario!");
  render();
}

// ═══════════════════════════════════════
// CSV EXPORT
// ═══════════════════════════════════════
function esportaCSV(){
  const rows=[["Data","Giorno","Tipo Pasto","Alimento","Grammi","Kcal","Carbo (g)","Proteine (g)","Grassi (g)","Ora"]];
  for(const data of Object.keys(STATE.diario).sort()){
    const log=STATE.diario[data]||[];if(!log.length)continue;
    const g=new Date(data+"T12:00:00").toLocaleDateString("it-IT",{weekday:"long"});
    for(const i of log){const r=i.qty/i.grammiBase;rows.push([data,g,i.cat||"-",i.nome,i.qty,r2(i.kcal*r),r2(i.carbo*r),r2(i.proteine*r),r2(i.grassi*r),i.ora||"-"])}
    const tot=log.reduce((a,i)=>{const r=i.qty/i.grammiBase;return{kcal:a.kcal+i.kcal*r,carbo:a.carbo+i.carbo*r,prot:a.prot+i.proteine*r,gras:a.gras+i.grassi*r}},{kcal:0,carbo:0,prot:0,gras:0});
    rows.push([data,g,">>> TOTALE","","",r2(tot.kcal),r2(tot.carbo),r2(tot.prot),r2(tot.gras),""]);rows.push([]);
  }
  rows.push([]);rows.push(["=== STORICO PESO ==="]);rows.push(["Data","Peso (kg)","Nota"]);
  for(const p of STATE.pesi)rows.push([p.data,p.kg,p.nota||""]);
  const csv="\uFEFF"+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(";")).join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");
  a.href=url;a.download=`NutriGabri_${todayStr()}.csv`;a.click();URL.revokeObjectURL(url);
}

// ═══════════════════════════════════════
// RENDER HELPERS
// ═══════════════════════════════════════
function el(tag,attrs,inner){
  const attrStr=Object.entries(attrs||{}).map(([k,v])=>{if(k==="style"&&typeof v==="object")return `style="${Object.entries(v).map(([sk,sv])=>sk.replace(/([A-Z])/g,"-$1").toLowerCase()+":"+sv).join(";")}"`; if(k.startsWith("on"))return "";return `${k}="${v}"`}).join(" ");
  return `<${tag} ${attrStr}>${inner||""}</${tag}>`;
}

function macroBar(label,cur,target,color){
  const pct=Math.min((cur/target)*100,100);
  const tol=10;const inRange=cur>=(target-tol)&&cur<=(target+tol);const over=cur>target+tol;
  const bc=inRange?C.green:over?C.red:color;
  return `<div style="margin-bottom:8px">
    <div style="display:flex;justify-content:space-between;margin-bottom:3px">
      <span style="font-size:11px;color:${C.muted}">${label}</span>
      <span style="font-size:11px;font-weight:700;color:${bc};font-family:DM Mono,monospace">${r2(cur)}g / ${target}g${inRange?" ✓":""}</span>
    </div>
    <div style="height:5px;background:${C.border};border-radius:99px;position:relative">
      <div style="height:100%;border-radius:99px;background:${bc};width:${pct}%;box-shadow:0 0 6px ${bc}88;transition:width 0.3s"></div>
    </div>
  </div>`;
}

function selectDropdown(id,items,value,label,color,groupBy){
  let opts=`<option value="">— ${label} —</option>`;
  if(groupBy){
    const groups={};items.forEach(i=>{const g=i[groupBy]||"Altro";if(!groups[g])groups[g]=[];groups[g].push(i)});
    for(const [g,arr]of Object.entries(groups)){opts+=`<optgroup label="${g}">`+arr.map(i=>`<option value="${i.nome}"${i.nome===value?"selected":""}>${i.nome}</option>`).join("")+"</optgroup>"}
  } else {
    opts+=items.map(i=>`<option value="${i.nome}"${i.nome===value?"selected":""}>${i.nome}</option>`).join("");
  }
  return `<div style="margin-bottom:10px">
    <label style="display:block;font-size:11px;color:${color};font-weight:700;margin-bottom:5px;font-family:DM Sans,sans-serif">${label}</label>
    <select id="${id}" style="width:100%;padding:10px 12px;border-radius:10px;background:#0d1821;color:${C.text};border:1px solid ${value?color:C.border};font-size:13px;font-family:DM Sans,sans-serif;cursor:pointer" onchange="handleSelect('${id}',this.value)">${opts}</select>
  </div>`;
}

// ═══════════════════════════════════════
// RENDER DIARIO TAB
// ═══════════════════════════════════════
function renderDiario(){
  const dateStr=STATE.diarioDate;
  const log=STATE.diario[dateStr]||[];
  const macro=calcDayMacros(dateStr);
  const isToday=dateStr===todayStr();

  // Date nav
  const dates=[];
  for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);dates.push(d.toISOString().split("T")[0])}

  let dateNav=`<div style="display:flex;gap:5px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px">`;
  for(const d of dates){
    const active=d===dateStr;const isT=d===todayStr();
    const lbl=isT?"Oggi":new Date(d+"T12:00:00").toLocaleDateString("it-IT",{day:"numeric",month:"short"});
    dateNav+=`<button onclick="setState({diarioDate:'${d}'})" style="flex-shrink:0;padding:6px 12px;border-radius:99px;border:none;cursor:pointer;font-size:11px;font-weight:700;font-family:DM Sans,sans-serif;background:${active?C.accent:C.card};color:${active?"#0d1821":C.muted};box-shadow:${active?`0 0 10px ${C.accent}55`:"none"}">${lbl}</button>`;
  }
  dateNav+=`</div>`;

  // Macro summary
  let macroHtml=`<div style="background:${C.card};border-radius:16px;padding:14px;margin-bottom:14px;border:1px solid ${C.border}">`;
  macroHtml+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <span style="font-size:13px;font-weight:700;color:${C.accent};font-family:DM Sans,sans-serif">📊 ${isToday?"Oggi":"Riepilogo"}</span>
    <span style="font-size:18px;font-weight:800;color:${macro.kcal>TARGET.kcal?C.red:C.text};font-family:DM Mono,monospace">${r2(macro.kcal)} <span style="font-size:11px;color:${C.muted}">/ ${TARGET.kcal} kcal</span></span>
  </div>`;
  macroHtml+=macroBar("🌾 Carboidrati",macro.carbo,TARGET.carbo,C.carbo);
  macroHtml+=macroBar("🥩 Proteine",macro.proteine,TARGET.proteine,C.proteine);
  macroHtml+=macroBar("🫒 Grassi",macro.grassi,TARGET.grassi,C.grassi);
  macroHtml+=`</div>`;

  // Group log by meal type
  const groups={};const ORDER=["🌅 Colazione","🍎 Spuntino","☀️ Pranzo","🌙 Cena","🥂 Aperitivo","—"];
  for(const item of log){const cat=item.cat||"—";if(!groups[cat])groups[cat]=[];groups[cat].push(item)}
  const COLORS={"🌅 Colazione":C.orange,"🍎 Spuntino":C.violet,"☀️ Pranzo":"#22d3ee","🌙 Cena":C.proteine,"🥂 Aperitivo":C.yellow,"—":C.muted};

  let logHtml="";
  if(log.length===0){logHtml=`<div style="text-align:center;padding:40px 20px;color:${C.muted};font-size:14px">Nessun pasto registrato${isToday?" per oggi":" in questo giorno"}.<br><br>Vai su 🍽️ Pasto per aggiungere!</div>`}
  else{
    for(const cat of ORDER){
      if(!groups[cat])continue;
      const items=groups[cat];
      const tot=items.reduce((a,i)=>{const r=i.qty/i.grammiBase;return{kcal:a.kcal+i.kcal*r,carbo:a.carbo+i.carbo*r,proteine:a.proteine+i.proteine*r,grassi:a.grassi+i.grassi*r}},{kcal:0,carbo:0,proteine:0,grassi:0});
      const color=COLORS[cat]||C.muted;
      const gid="g_"+cat.replace(/[^a-zA-Z]/g,"");
      logHtml+=`<div style="background:${C.card};border-radius:14px;margin-bottom:10px;overflow:hidden;border:1px solid ${C.border}">
        <div class="group-header" onclick="toggleGroup('${gid}')" style="padding:12px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid ${C.border}">
          <div style="font-size:13px;font-weight:800;color:${color};font-family:DM Sans,sans-serif">${cat}</div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:11px;color:${C.muted};font-family:DM Mono,monospace">${r2(tot.kcal)} kcal · C${r2(tot.carbo)} P${r2(tot.proteine)} G${r2(tot.grassi)}</span>
            <span style="color:${C.muted};font-size:10px" id="${gid}_arrow">▼</span>
          </div>
        </div>
        <div class="group-items open" id="${gid}">`;
      for(const item of items){
        const r=item.qty/item.grammiBase;
        logHtml+=`<div style="padding:10px 14px;border-bottom:1px solid ${C.border}22;display:flex;justify-content:space-between;align-items:center">
          <div style="flex:1">
            <div style="font-size:12px;color:${C.text};font-weight:600">${item.nome}</div>
            <div style="font-size:10px;color:${C.muted}">${item.qty}g · ${item.ora}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:12px;color:${C.accent};font-family:DM Mono,monospace">${r2(item.kcal*r)} kcal</span>
            <button onclick="removeItem('${item.id}')" style="background:#f8717122;color:${C.red};border:none;border-radius:7px;padding:4px 8px;cursor:pointer;font-size:11px">✕</button>
          </div>
        </div>`;
      }
      logHtml+=`</div></div>`;
    }
    // Export button
    logHtml+=`<button onclick="esportaCSV()" style="width:100%;background:${C.card};color:${C.accent};border:1px solid ${C.accent}44;border-radius:12px;padding:11px;font-weight:700;font-size:13px;cursor:pointer;font-family:DM Sans,sans-serif;margin-top:4px">📥 Esporta CSV per nutrizionista</button>`;
  }

  return `<div>
    <div style="font-size:19px;font-weight:800;color:${C.text};margin-bottom:12px;font-family:Playfair Display,serif">📔 Diario</div>
    ${dateNav}${macroHtml}${logHtml}
  </div>`;
}

    form+=`<div style="font-size:12px;color:${C.violet};font-weight:700;margin-bottom:12px;background:#a78bfa15;padding:8px 12px;border-radius:10px">💡 Scegli 1-2 componenti</div>`;
    form+=selectDropdown("spunt0",SPUNTINI_ALL,p.spuntComp[0],"Componente 1",C.violet);
    form+=selectDropdown("spunt1",SPUNTINI_ALL,p.spuntComp[1],"Componente 2 (opzionale)",C.violet);
  } else if(p.tipo==="aperitivo"){
    form+=`<div style="font-size:12px;color:${C.yellow};font-weight:700;margin-bottom:12px;background:#fbbf2415;padding:8px 12px;border-radius:10px">🥂 Ricorda che l'alcol non è nel piano nutrizionale!</div>`;
    form+=selectDropdown("aperDrink1",APERITIVO_DRINK,p.aperDrink1,"Drink principale",C.yellow);
    form+=selectDropdown("aperDrink2",APERITIVO_DRINK,p.aperDrink2,"Secondo drink (opzionale)",C.yellow);
    form+=selectDropdown("aperStuz",APERITIVO_STUZZICHINI,p.aperStuz,"Stuzzichino (opzionale)",C.orange);
  }
  form+=`</div>`;

  // Riepilogo
  const items=calcPasto();
  const macro=sumMacros(items);
  const hasContent=items.length>0;
  let recap="";
  if(hasContent){
    const labels={colazione:"🌅 Colazione",pranzo:"☀️ Pranzo",cena:"🌙 Cena",spuntino:"🍎 Spuntino",aperitivo:"🥂 Aperitivo"};
    recap=`<div style="background:linear-gradient(135deg,${C.accentDim},${C.card});border-radius:18px;padding:16px;border:1px solid ${C.accent}44">
      <div style="font-size:13px;font-weight:700;color:${C.accent};margin-bottom:12px">📊 Riepilogo ${labels[p.tipo]}</div>
      <div style="display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap">
        ${[{l:"Kcal",v:r2(macro.kcal),c:C.text},{l:"Carbo",v:r2(macro.carbo)+"g",c:C.carbo},{l:"Prot",v:r2(macro.proteine)+"g",c:C.proteine},{l:"Grassi",v:r2(macro.grassi)+"g",c:C.grassi}].map(({l,v,c})=>`<div style="flex:1;min-width:55px;background:#0d182288;border-radius:10px;padding:10px 6px;text-align:center"><div style="font-size:17px;font-weight:800;color:${c};font-family:DM Mono,monospace">${v}</div><div style="font-size:9px;color:${C.muted}">${l}</div></div>`).join("")}
      </div>
      <div style="font-size:11px;color:${C.muted};margin-bottom:12px;line-height:1.5">${items.map(i=>i.nome).join(" + ")}</div>
      <div style="margin-bottom:10px">
        <div style="font-size:11px;color:${C.muted};margin-bottom:5px;font-weight:600">📅 Aggiungi a quale giorno?</div>
        <div style="display:flex;gap:6px;align-items:center">
          <input type="date" value="${p.dataTarget}" max="${todayStr()}" onchange="STATE.pasto.dataTarget=this.value;render()" style="flex:1;padding:9px 12px;border-radius:10px;background:#0d1821;color:${C.text};border:1px solid ${C.accent}66;font-size:13px;font-family:DM Mono,monospace">
          <button onclick="STATE.pasto.dataTarget='${todayStr()}';render()" style="padding:9px 12px;border-radius:10px;background:${p.dataTarget===todayStr()?C.accent:C.card};color:${p.dataTarget===todayStr()?"#0d1821":C.muted};border:none;cursor:pointer;font-size:11px;font-weight:700">Oggi</button>
        </div>
      </div>
      <button onclick="addToDiary()" style="width:100%;background:${C.accent};color:#0d1821;border:none;border-radius:12px;padding:13px;font-weight:800;font-size:14px;cursor:pointer;box-shadow:0 0 16px ${C.accent}66">➕ Aggiungi al Diario</button>
    </div>`;
  }

  return `<div>
    <div style="font-size:19px;font-weight:800;color:${C.text};margin-bottom:14px;font-family:Playfair Display,serif">🍽️ Componi il Pasto</div>
    ${tipoNav}${form}${recap}
  </div>`;
}

// ═══════════════════════════════════════
// RENDER FRIGO TAB
// ═══════════════════════════════════════
function renderFrigo(){
  const tutto=[...CARBS_PRANZO.map(i=>({...i,tipo:"carbo"})),...PROTS_PRANZO.map(i=>({...i,tipo:"proteina"})),...PROTS_CENA.filter(x=>!PROTS_PRANZO.find(y=>y.nome===x.nome)).map(i=>({...i,tipo:"proteina"})),...VERDURE.map(i=>({...i,tipo:"verdura"}))];
  const cerca=STATE.frigoSearch;const fil=STATE.frigoFiltro;
  const filtrati=tutto.filter(i=>{
    const mc=i.nome.toLowerCase().includes(cerca.toLowerCase());
    const mt=fil==="tutti"||i.tipo===fil;
    return mc&&mt;
  });

  const toggle=nome=>{const f=STATE.frigo;const new_f=f.includes(nome)?f.filter(x=>x!==nome):[...f,nome];STATE.frigo=new_f;save("ng_frigo_v4",new_f);render()};

  let combos=[];
  if(STATE.frigo.length>0){
    const items=tutto.filter(i=>STATE.frigo.includes(i.nome));
    const carbs=items.filter(i=>i.tipo==="carbo");const prots=items.filter(i=>i.tipo==="proteina");const verd=items.filter(i=>i.tipo==="verdura");
    for(const c of carbs)for(const pr of prots){const v=verd[0];combos.push({tipo:"Pasto 🍽️",names:[c.nome,pr.nome,...(v?[v.nome]:[])],kcal:r2((c.kcal||0)+(pr.kcal||0)+(v?.kcal||0)+90)})}
    combos=combos.slice(0,4);
  }

  let ingredHtml=`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;max-height:200px;overflow-y:auto">`;
  for(const item of filtrati){
    const sel=STATE.frigo.includes(item.nome);
    ingredHtml+=`<button onclick="toggleFrigo('${item.nome.replace(/'/g,"\\'")}')"`+` style="padding:5px 10px;border-radius:99px;font-size:11px;cursor:pointer;background:${sel?C.accent:C.card};color:${sel?"#0d1821":C.muted};border:1px solid ${sel?C.accent:C.border};font-weight:700">${item.nome.split("(")[0].trim()}</button>`;
  }
  ingredHtml+=`</div>`;

  let combosHtml="";
  if(combos.length){
    combosHtml=`<div style="font-size:13px;font-weight:700;color:${C.accent};margin-bottom:10px">💡 Combinazioni suggerite (${STATE.frigo.length} ingredienti)</div>`;
    for(const c of combos){
      combosHtml+=`<div style="background:${C.card};border-radius:12px;padding:12px;margin-bottom:8px;border:1px solid ${C.border}">
        <div style="font-size:11px;color:${C.accent};font-weight:700;margin-bottom:5px">${c.tipo} · ${c.kcal} kcal</div>
        <div style="font-size:12px;color:${C.text}">${c.names.join(" + ")}</div>
      </div>`;
    }
  } else if(STATE.frigo.length>0){
    combosHtml=`<div style="background:${C.card};border-radius:12px;padding:16px;color:${C.muted};font-size:12px">Aggiungi almeno un carboidrato + una proteina per i suggerimenti!</div>`;
  }

  const filtroButtons=[["tutti","Tutti"],["carbo","🌾 Carbo"],["proteina","🥩 Proteine"],["verdura","🥦 Verdure"]].map(([k,l])=>`<button onclick="setState({frigoFiltro:'${k}'})" style="padding:5px 10px;border-radius:99px;font-size:11px;cursor:pointer;background:${STATE.frigoFiltro===k?C.accent:C.border};color:${STATE.frigoFiltro===k?"#0d1821":C.muted};border:none;font-weight:700">${l}</button>`).join("");

  return `<div>
    <div style="font-size:19px;font-weight:800;color:${C.text};margin-bottom:6px;font-family:Playfair Display,serif">🥦 Frigo & Dispensa</div>
    <div style="font-size:12px;color:${C.muted};margin-bottom:12px">Seleziona cosa hai a casa per ricevere suggerimenti pasto</div>
    <input placeholder="🔍 Cerca ingrediente..." value="${cerca}" oninput="STATE.frigoSearch=this.value;render()" style="width:100%;padding:10px 14px;border-radius:12px;background:${C.card};color:${C.text};border:1px solid ${C.border};margin-bottom:10px;font-size:13px;box-sizing:border-box">
    <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">${filtroButtons}</div>
    ${ingredHtml}${combosHtml}
  </div>`;
}

// ═══════════════════════════════════════
// RENDER PESO TAB
// ═══════════════════════════════════════
function renderPeso(){
  const pesi=STATE.pesi;const lastP=pesi.length?pesi[pesi.length-1]:null;
  const diff=pesi.length>1?r2(pesi[pesi.length-1].kg-75.1):0;
  const rimanente=lastP?r2(lastP.kg-65):null;

  // SVG chart
  let chart="";
  if(pesi.length>=2){
    const W=340,H=120,pad={t:20,b:20,l:30,r:20};
    const cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
    const ks=pesi.map(p=>p.kg);const minK=Math.min(...ks)-0.5,maxK=Math.max(...ks,65.1)+0.5;
    const xP=i=>(pad.l+i/Math.max(pesi.length-1,1)*cW);
    const yP=k=>(pad.t+(maxK-k)/(maxK-minK)*cH);
    const pts=pesi.map((p,i)=>`${xP(i)},${yP(p.kg)}`).join(" L");
    const area=`${xP(0)},${pad.t+cH} L${pts} L${xP(pesi.length-1)},${pad.t+cH} Z`;
    chart=`<div style="background:${C.card};border-radius:16px;padding:14px;margin-bottom:14px;border:1px solid ${C.border};overflow:hidden">
      <svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
        <line x1="${pad.l}" y1="${yP(65)}" x2="${W-pad.r}" y2="${yP(65)}" stroke="${C.green}" stroke-width="1.5" stroke-dasharray="5,4"/>
        <text x="${W-pad.r}" y="${yP(65)-5}" fill="${C.green}" font-size="9" text-anchor="end">65kg 🎯</text>
        <path d="M${area}" fill="${C.accent}18"/>
        <path d="M${pts}" fill="none" stroke="${C.accent}" stroke-width="2.5" style="filter:drop-shadow(0 0 4px ${C.accent})"/>
        ${pesi.map((p,i)=>`<circle cx="${xP(i)}" cy="${yP(p.kg)}" r="5" fill="${C.accent}"/><text x="${xP(i)}" y="${yP(p.kg)-9}" fill="${C.text}" font-size="8" text-anchor="middle" font-family="DM Mono,monospace">${p.kg}</text><text x="${xP(i)}" y="${H-6}" fill="${C.muted}" font-size="7" text-anchor="middle">${p.data.slice(5)}</text>`).join("")}
      </svg>
    </div>`;
  }

  let statsHtml=`<div style="display:flex;gap:8px;margin-bottom:14px">`;
  if(lastP) statsHtml+=`<div style="flex:1;background:${C.card};border-radius:12px;padding:12px;border:1px solid ${C.border};text-align:center"><div style="font-size:22px;font-weight:800;color:${C.accent};font-family:DM Mono,monospace">${lastP.kg}</div><div style="font-size:10px;color:${C.muted}">kg attuale</div></div>`;
  statsHtml+=`<div style="flex:1;background:${C.card};border-radius:12px;padding:12px;border:1px solid ${C.border};text-align:center"><div style="font-size:22px;font-weight:800;color:${diff<=0?C.green:C.orange};font-family:DM Mono,monospace">${diff<=0?diff:"+"+diff}</div><div style="font-size:10px;color:${C.muted}">da 75.1 kg</div></div>`;
  if(rimanente!==null) statsHtml+=`<div style="flex:1;background:${C.card};border-radius:12px;padding:12px;border:1px solid ${C.border};text-align:center"><div style="font-size:22px;font-weight:800;color:${rimanente<=0?C.green:C.yellow};font-family:DM Mono,monospace">${rimanente<=0?"🎯":rimanente}</div><div style="font-size:10px;color:${C.muted}">${rimanente<=0?"Obiettivo!":"kg all'obiettivo"}</div></div>`;
  statsHtml+=`</div>`;

  const storico=[...pesi].reverse().map(p=>`<div style="background:${C.card};border-radius:11px;padding:9px 14px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;border:1px solid ${C.border}">
    <div>
      <div style="font-size:12px;color:${C.muted}">${new Date(p.data+"T12:00:00").toLocaleDateString("it-IT",{day:"numeric",month:"short",year:"numeric"})}</div>
      ${p.nota?`<div style="font-size:10px;color:${C.accent}">${p.nota}</div>`:""}
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:15px;font-weight:800;color:${C.accent};font-family:DM Mono,monospace">${p.kg} kg</span>
      <button onclick="removePeso('${p.data}')" style="background:#f8717122;color:${C.red};border:none;border-radius:7px;padding:4px 8px;cursor:pointer;font-size:11px">✕</button>
    </div>
  </div>`).join("");

  return `<div>
    <div style="font-size:19px;font-weight:800;color:${C.text};margin-bottom:12px;font-family:Playfair Display,serif">⚖️ Tracker Peso</div>
    ${statsHtml}${chart}
    <div style="background:${C.card};border-radius:18px;padding:16px;margin-bottom:14px;border:1px solid ${C.border}">
      <div style="font-size:13px;font-weight:700;color:${C.accent};margin-bottom:12px">⚖️ Registra misurazione</div>
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <input type="date" id="pesoData" value="${STATE.pesoData}" onchange="STATE.pesoData=this.value" style="flex:1;padding:9px 12px;border-radius:10px;background:#0d1821;color:${C.text};border:1px solid ${C.border};font-size:13px">
        <input type="number" id="pesoKg" step="0.1" placeholder="kg (es. 65.2)" value="${STATE.pesoInput}" oninput="STATE.pesoInput=this.value" style="flex:1;padding:9px 12px;border-radius:10px;background:#0d1821;color:${C.text};border:1px solid ${C.border};font-size:13px;font-family:DM Mono,monospace">
      </div>
      <div style="display:flex;gap:8px">
        <input id="pesaNota" placeholder="Nota (es. dopo palestra)" value="${STATE.pesaNota}" oninput="STATE.pesaNota=this.value" style="flex:1;padding:9px 12px;border-radius:10px;background:#0d1821;color:${C.text};border:1px solid ${C.border};font-size:12px">
        <button onclick="addPeso()" style="background:${C.accent};color:#0d1821;border:none;border-radius:10px;padding:9px 16px;font-weight:800;font-size:13px;cursor:pointer">Salva</button>
      </div>
    </div>
    <div style="font-size:12px;font-weight:700;color:${C.muted};margin-bottom:8px">📋 Storico</div>
    ${storico}
    <button onclick="esportaCSV()" style="width:100%;background:${C.card};color:${C.accent};border:1px solid ${C.accent}44;border-radius:12px;padding:11px;font-weight:700;font-size:13px;cursor:pointer;margin-top:8px">📥 Esporta CSV per nutrizionista</button>
  </div>`;
}

// ═══════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════
function render(){
  const today=todayStr();const macro=calcDayMacros(today);
  const header=`<div style="background:linear-gradient(135deg,${C.card},#0d2035);padding:20px 16px 14px;border-bottom:1px solid ${C.border};position:sticky;top:0;z-index:50">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:22px;font-weight:800;font-family:Playfair Display,serif;color:${C.accent}">NutriGabri</div>
        <div style="font-size:10px;color:${C.muted}">Piano 1600 kcal · 33 anni · obj 65 kg</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:20px;font-weight:800;color:${macro.kcal>TARGET.kcal?C.red:C.text};font-family:DM Mono,monospace">${r2(macro.kcal)}</div>
        <div style="font-size:9px;color:${C.muted}">/ ${TARGET.kcal} kcal oggi</div>
      </div>
    </div>
    <div style="display:flex;gap:5px;margin-top:11px">
      ${[{l:"C",cur:macro.carbo,max:TARGET.carbo,color:C.carbo},{l:"P",cur:macro.proteine,max:TARGET.proteine,color:C.proteine},{l:"G",cur:macro.grassi,max:TARGET.grassi,color:C.grassi}].map(({l,cur,max,color})=>`<div style="flex:1"><div style="display:flex;justify-content:space-between;font-size:9px;color:${C.muted};margin-bottom:2px"><span>${l}</span><span>${r2(cur)}/${max}g</span></div><div style="height:4px;background:${C.border};border-radius:99px"><div style="height:100%;background:${cur>max?C.red:color};border-radius:99px;width:${Math.min(cur/max*100,100)}%;box-shadow:0 0 5px ${color}88"></div></div></div>`).join("")}
    </div>
  </div>`;

  const tabs=[{key:"diario",icon:"📔",label:"Diario"},{key:"pasto",icon:"🍽️",label:"Pasto"},{key:"frigo",icon:"🥦",label:"Frigo"},{key:"peso",icon:"⚖️",label:"Peso"}];
  const bottomNav=`<div style="position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:${C.card};border-top:1px solid ${C.border};display:flex;z-index:50">
    ${tabs.map(t=>`<button onclick="STATE.tab='${t.key}';render()" style="flex:1;padding:11px 6px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px"><span style="font-size:19px">${t.icon}</span><span style="font-size:10px;font-weight:700;color:${STATE.tab===t.key?C.accent:C.muted};border-bottom:2px solid ${STATE.tab===t.key?C.accent:"transparent"};padding-bottom:1px">${t.label}</span></button>`).join("")}
  </div>`;

  let content="";
  if(STATE.tab==="diario")content=renderDiario();
  else if(STATE.tab==="pasto")content=renderPasto();
  else if(STATE.tab==="frigo")content=renderFrigo();
  else if(STATE.tab==="peso")content=renderPeso();

  document.getElementById("app").innerHTML=header+`<div style="padding:16px 14px">${content}</div>`+bottomNav;
}

// ═══════════════════════════════════════
// EVENT HANDLERS
// ═══════════════════════════════════════
function handleSelect(id,value){
  const p=STATE.pasto;
  if(id==="pastoCarbo"){p.carbo=value||null}
  else if(id==="pastoProt1"){p.prot1=value||null}
  else if(id==="pastoProt2"){p.prot2=value||null}
  else if(id==="pastoVerd"){p.verd=value||null}
  else if(id==="pastoBev"){p.bevanda=value||null}
  else if(id==="pastoFrutta"){p.frutta=value||null}
  else if(id==="pastoFS"){p.fruttaSecca=value||null}
  else if(id==="aperDrink1"){p.aperDrink1=value||null}
  else if(id==="aperDrink2"){p.aperDrink2=value||null}
  else if(id==="aperStuz"){p.aperStuz=value||null}
  else if(id==="spunt0"){p.spuntComp[0]=value||null}
  else if(id==="spunt1"){p.spuntComp[1]=value||null}
  else if(id==="col0"){p.colComp[0]=value||null}
  else if(id==="col1"){p.colComp[1]=value||null}
  else if(id==="col2"){p.colComp[2]=value||null}
  else if(id==="col3"){p.colComp[3]=value||null}
  else if(id==="col4"){p.colComp[3]=value||null}
  render();
}

function setPastoTipo(t){STATE.pasto.tipo=t;render()}

function toggleGroup(id){
  const el=document.getElementById(id);const arrow=document.getElementById(id+"_arrow");
  if(el){el.classList.toggle("open");if(arrow)arrow.textContent=el.classList.contains("open")?"▼":"▶"}
}

function removeItem(id){
  const key=STATE.diarioDate;
  const log=(STATE.diario[key]||[]).filter(i=>String(i.id)!==String(id));
  STATE.diario={...STATE.diario,[key]:log};
  save("ng_diario_v4",STATE.diario);render();
}

function toggleFrigo(nome){
  const f=STATE.frigo;
  STATE.frigo=f.includes(nome)?f.filter(x=>x!==nome):[...f,nome];
  save("ng_frigo_v4",STATE.frigo);render();
}

function addPeso(){
  const kg=parseFloat(STATE.pesoInput);
  if(isNaN(kg)||kg<30||kg>200){showToast("⚠️ Inserisci un peso valido!");return}
  const data=STATE.pesoData||todayStr();
  const pesi=STATE.pesi.filter(p=>p.data!==data);
  pesi.push({data,kg,nota:STATE.pesaNota||""});
  pesi.sort((a,b)=>a.data.localeCompare(b.data));
  STATE.pesi=pesi;STATE.pesoInput="";STATE.pesaNota="";
  save("ng_pesi_v4",STATE.pesi);
  showToast(`✅ Peso salvato: ${kg} kg`);render();
}

function removePeso(data){
  STATE.pesi=STATE.pesi.filter(p=>p.data!==data);
  save("ng_pesi_v4",STATE.pesi);render();
}

// Start
render();
</script>
