function usePersist(key, init) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : init; }
    catch { return init; }
  });
  useEffect(() => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }, [key, val]);
  return [val, setVal];
}

  const d = new Date();

};
const r2 = n => Math.round(n * 10) / 10;

// Esporta diario come CSV scaricabile (compatibile Excel)
function esportaDiarioCSV(diario, pesi) {
  const rows = [];
  // Header
  rows.push(["Data", "Giorno", "Tipo Pasto", "Alimento", "Grammi", "Kcal", "Carbo (g)", "Proteine (g)", "Grassi (g)", "Ora"]);

  const dateOrdinate = Object.keys(diario).sort();
  for (const data of dateOrdinate) {
    const log = diario[data] || [];
    if (log.length === 0) continue;
    const giorno = new Date(data + "T12:00:00").toLocaleDateString("it-IT", { weekday: "long" });
    for (const item of log) {
      const r = item.qty / item.grammiBase;
      rows.push([
        data,
        giorno,
        item.cat || "-",
        item.nome,
        item.qty,
        r2(item.kcal * r),
        r2(item.carbo * r),
        r2(item.proteine * r),
        r2(item.grassi * r),
        item.ora || "-"
      ]);
    }
    // Riga totale giorno
    const totD = log.reduce((a, i) => {
      const r = i.qty / i.grammiBase;
      return { kcal: a.kcal + i.kcal*r, carbo: a.carbo + i.carbo*r, prot: a.prot + i.proteine*r, gras: a.gras + i.grassi*r };
    }, { kcal:0, carbo:0, prot:0, gras:0 });
    rows.push([data, giorno, ">>> TOTALE GIORNO", "", "", r2(totD.kcal), r2(totD.carbo), r2(totD.prot), r2(totD.gras), ""]);
    rows.push([]); // riga vuota separatore
  }

  // Foglio peso
  rows.push([]);
  rows.push(["=== STORICO PESO ==="]);
  rows.push(["Data", "Peso (kg)", "Nota"]);
  for (const p of pesi) {
    rows.push([p.data, p.kg, p.nota || ""]);
  }

  // Converti in CSV con BOM per Excel italiano (separatore ;)
  const csv = "﻿" + rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(";")).join("
");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const oggi = new Date().toISOString().split("T")[0];
  a.href = url;
  a.download = `NutriGabri_Diario_${oggi}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function MacroBar({ label, current, target, color, tolerance = 0 }) {
  const pct = Math.min((current / target) * 100, 100);
  // Verde se entro tolleranza (+/- tolerance), rosso se oltre target+tolerance
  const inRange = target > 0 && current >= (target - tolerance) && current <= (target + tolerance);
  const over = current > target + tolerance;
  const barColor = inRange ? C.green : over ? C.red : color;
  const textColor = inRange ? C.green : over ? C.red : color;
  return (
    <div style={{ marginBottom: 8 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
        <span style={{ fontSize: 11, color: C.muted, fontFamily: "DM Sans, sans-serif" }}>{label}</span>
        <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
          {inRange && <span style={{ fontSize: 9, color: C.green, fontWeight: 800 }}>✓</span>}
          <span style={{ fontSize: 11, fontWeight: 700, color: textColor, fontFamily: "DM Mono, monospace" }}>{r2(current)}{target > 0 ? `g / ${target}g` : "g"}</span>
        </div>
      </div>
      <div style={{ height: 5, background: C.border, borderRadius: 99, position: "relative" }}>
        <div style={{ height: "100%", borderRadius: 99, background: barColor, width: `${pct}%`, transition: "width 0.4s", boxShadow: `0 0 6px ${barColor}88` }} />
        {/* Tolerance markers */}
        {tolerance > 0 && target > 0 && (
          <>
            <div style={{ position: "absolute", top: -1, left: `${Math.min(((target-tolerance)/target)*100,100)}%`, width: 2, height: 7, background: `${C.green}88`, borderRadius: 1 }} />
            <div style={{ position: "absolute", top: -1, left: `${Math.min(((target+tolerance)/target)*100,100)}%`, width: 2, height: 7, background: `${C.green}88`, borderRadius: 1 }} />
          </>
        )}
      </div>
    </div>
  );
}

function DonutChart({ kcal, target }) {
  const pct = Math.min(kcal / target, 1);
  const r = 52, cx = 68, cy = 68, circ = 2 * Math.PI * r;
  const over = kcal > target;
  return (
    <div style={{ position: "relative", width: 136, height: 136, flexShrink: 0 }}>
      <svg width={136} height={136}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={C.border} strokeWidth={11} />
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={over ? C.red : C.accent} strokeWidth={11}
          strokeDasharray={`${pct * circ} ${circ}`} strokeLinecap="round"
          transform={`rotate(-90 ${cx} ${cy})`}
          style={{ transition: "stroke-dasharray 0.5s", filter: `drop-shadow(0 0 5px ${over ? C.red : C.accent})` }} />
      </svg>
      <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
        <span style={{ fontSize: 20, fontWeight: 800, color: over ? C.red : C.text, fontFamily: "DM Mono, monospace", lineHeight: 1 }}>{r2(kcal)}</span>
        <span style={{ fontSize: 9, color: C.muted }}>/ {target} kcal</span>
      </div>
    </div>
  );
}

function SearchSelect({ label, value, onChange, items, color = C.accent, groupBy = null }) {
  const [open, setOpen] = useState(false);
  const [cerca, setCerca] = useState("");
  const filtrati = items.filter(i => i.nome.toLowerCase().includes(cerca.toLowerCase()));
  const gruppi = groupBy ? filtrati.reduce((acc, i) => { const g = i[groupBy] || "Altro"; if (!acc[g]) acc[g] = []; acc[g].push(i); return acc; }, {}) : null;
  const sel = items.find(i => i.nome === value);
  return (
    <div style={{ marginBottom: 10, position: "relative" }}>
      {label && <div style={{ fontSize: 11, color: C.muted, marginBottom: 4, fontWeight: 600, fontFamily: "DM Sans, sans-serif" }}>{label}</div>}
      <div onClick={() => setOpen(!open)} style={{ padding: "9px 12px", borderRadius: 10, background: "#0d1821", cursor: "pointer", border: `1px solid ${value ? color : C.border}`, fontSize: 12, color: value ? C.text : C.muted, fontFamily: "DM Sans, sans-serif", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", maxWidth: "90%" }}>{sel ? sel.nome : "— seleziona —"}</span>
        <span style={{ color: C.muted, fontSize: 10, flexShrink: 0 }}>{open ? "▲" : "▼"}</span>
      </div>
      {open && (
        <div style={{ position: "absolute", zIndex: 200, background: C.card2, border: `1px solid ${C.border}`, borderRadius: 12, width: "100%", maxHeight: 280, display: "flex", flexDirection: "column", boxShadow: "0 8px 32px #00000099" }}>
          <div style={{ padding: "8px 10px", borderBottom: `1px solid ${C.border}`, flexShrink: 0 }}>
            <input autoFocus placeholder="🔍 cerca..." value={cerca} onChange={e => setCerca(e.target.value)}
              style={{ width: "100%", background: "#0d1821", border: `1px solid ${C.border}`, borderRadius: 8, padding: "6px 10px", color: C.text, fontSize: 12, fontFamily: "DM Sans, sans-serif", boxSizing: "border-box" }} />
          </div>
          <div style={{ overflowY: "auto", flex: 1 }}>
            <div onClick={() => { onChange(null); setOpen(false); setCerca(""); }} style={{ padding: "8px 12px", cursor: "pointer", fontSize: 12, color: C.muted, fontFamily: "DM Sans, sans-serif" }}>— nessuno —</div>
            {gruppi && !cerca ? Object.entries(gruppi).map(([g, gItems]) => (
              <div key={g}>
                <div style={{ padding: "5px 12px", fontSize: 10, fontWeight: 800, color, background: "#0d182288", fontFamily: "DM Sans, sans-serif" }}>{g}</div>
                {gItems.map(item => (
                  <div key={item.nome} onClick={() => { onChange(item.nome); setOpen(false); setCerca(""); }}
                    style={{ padding: "8px 12px 8px 20px", cursor: "pointer", fontSize: 12, color: C.text, fontFamily: "DM Sans, sans-serif", background: value === item.nome ? C.accentDim : "transparent", display: "flex", justifyContent: "space-between" }}>
                    <span>{item.nome}</span>
                    <span style={{ color: C.muted, fontFamily: "DM Mono, monospace", fontSize: 10, flexShrink: 0, paddingLeft: 8 }}>{item.kcal}kcal</span>
                  </div>
                ))}
              </div>
            )) : filtrati.map(item => (
              <div key={item.nome} onClick={() => { onChange(item.nome); setOpen(false); setCerca(""); }}
                style={{ padding: "8px 12px", cursor: "pointer", fontSize: 12, color: C.text, fontFamily: "DM Sans, sans-serif", background: value === item.nome ? C.accentDim : "transparent", display: "flex", justifyContent: "space-between" }}>
                <span>{item.nome}</span>
                <span style={{ color: C.muted, fontFamily: "DM Mono, monospace", fontSize: 10, flexShrink: 0, paddingLeft: 8 }}>{item.kcal}kcal</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function gruppaPasto(items) {
  const ORDINE = ["🌅 Colazione", "🍎 Spuntino", "☀️ Pranzo", "🌙 Cena", "🥂 Aperitivo"];
  const mappa = {};
  for (const item of items) {
    let gruppo = "📦 Altro";
    const cat = item.cat || "";
    if (cat.includes("Colazione")) gruppo = "🌅 Colazione";
    else if (cat.includes("Spuntino")) gruppo = "🍎 Spuntino";
    else if (cat.includes("Pranzo") || cat.includes("pranzo")) gruppo = "☀️ Pranzo";
    else if (cat.includes("Cena") || cat.includes("cena")) gruppo = "🌙 Cena";
    else if (cat.includes("Aperitivo")) gruppo = "🥂 Aperitivo";
    if (!mappa[gruppo]) mappa[gruppo] = [];
    mappa[gruppo].push(item);
  }
  const result = [];
  for (const k of ORDINE) { if (mappa[k]) result.push([k, mappa[k]]); }
  if (mappa["📦 Altro"]) result.push(["📦 Altro", mappa["📦 Altro"]]);
  return result;
}

const PASTO_COLORS = {
  "🌅 Colazione": "#f59e0b",
  "🍎 Spuntino":  "#a78bfa",
  "☀️ Pranzo":    "#00e5b4",
  "🌙 Cena":      "#60a5fa",
  "🥂 Aperitivo": "#fbbf24",
  "📦 Altro":     "#64748b",
};
const PASTO_BG = {
  "🌅 Colazione": "#f59e0b18",
  "🍎 Spuntino":  "#a78bfa18",
  "☀️ Pranzo":    "#00e5b418",
  "🌙 Cena":      "#60a5fa18",
  "🥂 Aperitivo": "#fbbf2418",
  "📦 Altro":     "#64748b18",
};

function dateDisponibili(diario) {
  const oggi = todayStr();
  const keys = Object.keys(diario).filter(k => (diario[k] || []).length > 0);
  const set = new Set([...keys, oggi]);
  return [...set].sort((a, b) => b.localeCompare(a));
}

function formatDataLabel(dateStr) {
  const oggi = todayStr();
  const ieri = new Date(); ieri.setDate(ieri.getDate() - 1);
  const ieriStr = ieri.toISOString().split("T")[0];
  if (dateStr === oggi) return "Oggi";
  if (dateStr === ieriStr) return "Ieri";
  return new Date(dateStr + "T12:00:00").toLocaleDateString("it-IT", { weekday: "short", day: "numeric", month: "short" });
}
function formatDataLunga(dateStr) {
  return new Date(dateStr + "T12:00:00").toLocaleDateString("it-IT", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
}

function DiarioTab({ diario, setDiario }) {
  const oggi = todayStr();
  const [dataVista, setDataVista] = useState(oggi);
  const [expandedGruppi, setExpandedGruppi] = useState({});

  const log = diario[dataVista] || [];
  const gruppi = gruppaPasto(log);
  const isOggi = dataVista === oggi;

  const tot = log.reduce((acc, i) => {
    const r = i.qty / i.grammiBase;
    const isVerd = (i.cat || "").includes("Verdur") || (i.nome || "").toLowerCase().includes("verdur") || (i.nome || "").toLowerCase().includes("insalat") || (i.nome || "").toLowerCase().includes("spinac") || (i.nome || "").toLowerCase().includes("broccol");
    return {
      kcal: acc.kcal + i.kcal * r,
      carbo: acc.carbo + i.carbo * r,
      proteine: acc.proteine + i.proteine * r,
      grassi: acc.grassi + i.grassi * r,
      verdure: acc.verdure + (isVerd ? i.qty * r : 0),
    };
  }, { kcal: 0, carbo: 0, proteine: 0, grassi: 0, verdure: 0 });

  const date = dateDisponibili(diario);

  function toggleGruppo(g) {
    setExpandedGruppi(prev => ({ ...prev, [g]: prev[g] === false ? true : false }));
  }
  function rimuoviItem(id) {
    setDiario({ ...diario, [dataVista]: log.filter(i => i.id !== id) });
  }

  return (
    <div>
      <div style={{ marginBottom: 14 }}>
        <div style={{ fontSize: 10, color: C.muted, fontFamily: "DM Sans, sans-serif", marginBottom: 2 }}>{formatDataLunga(dataVista)}</div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ fontSize: 19, fontWeight: 800, color: C.text, fontFamily: "Playfair Display, serif" }}>
            {isOggi ? "Diario di Oggi" : "Storico"}
          </div>
          {isOggi && (
            <div style={{ fontSize: 10, color: C.accent, background: C.accentDim, padding: "4px 10px", borderRadius: 99, fontWeight: 700, fontFamily: "DM Sans, sans-serif" }}>
              Aggiungi da Pasto
            </div>
          )}
        </div>
      </div>

      {/* Scrollabile orizzontale date */}
      <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 6, marginBottom: 14, scrollbarWidth: "none" }}>
        {date.map(d => (
          <button key={d} onClick={() => { setDataVista(d); setExpandedGruppi({}); }} style={{
            flexShrink: 0, padding: "7px 13px", borderRadius: 99, border: "none", cursor: "pointer",
            background: dataVista === d ? C.accent : C.card,
            color: dataVista === d ? "#0d1821" : C.muted,
            fontWeight: 800, fontSize: 11, fontFamily: "DM Sans, sans-serif",
            boxShadow: dataVista === d ? `0 0 8px ${C.accent}55` : "none",
            minWidth: 50, textAlign: "center",
          }}>
            <div>{formatDataLabel(d)}</div>
            {(diario[d] || []).length > 0 && d !== dataVista && (
              <div style={{ fontSize: 8, color: C.muted, marginTop: 1 }}>{(diario[d] || []).length} voci</div>
            )}
          </button>
        ))}
      </div>

      {/* Macros dashboard */}
      <div style={{ background: C.card, borderRadius: 18, padding: 16, marginBottom: 14, border: `1px solid ${C.border}` }}>
        <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
          <DonutChart kcal={tot.kcal} target={PIANO_KCAL} />
          <div style={{ flex: 1 }}>
            <MacroBar label="Carboidrati" current={tot.carbo} target={TARGET.carbo} color={C.carbo} tolerance={10} />
            <MacroBar label="Proteine" current={tot.proteine} target={TARGET.proteine} color={C.proteine} tolerance={10} />
            <MacroBar label="Grassi" current={tot.grassi} target={TARGET.grassi} color={C.grassi} tolerance={10} />
            <MacroBar label="Verdure" current={tot.verdure} target={TARGET.verdure} color={C.green} tolerance={30} />
          </div>
        </div>
        <div style={{ display: "flex", gap: 6, marginTop: 10, flexWrap: "wrap" }}>
          {[
            { label: isOggi ? `${r2(PIANO_KCAL - tot.kcal)} kcal rimanenti` : `${r2(tot.kcal)} kcal totali`, ok: tot.kcal <= PIANO_KCAL },
            { label: `Proteine ${tot.proteine >= TARGET.proteine * 0.75 ? "✓" : "⚠️ basse"}`, ok: tot.proteine >= TARGET.proteine * 0.75 },
            { label: `${gruppi.length} pasti registrati`, ok: true },
          ].map(({ label, ok }, i) => (
            <span key={i} style={{ fontSize: 10, padding: "2px 8px", borderRadius: 99, background: ok ? "#4ade8022" : "#f8717122", color: ok ? C.green : C.red, fontWeight: 700, fontFamily: "DM Sans, sans-serif" }}>{label}</span>
          ))}
        </div>
      </div>

      {/* Esporta hint - solo se ci sono dati */}
      {Object.keys(diario).some(k => (diario[k]||[]).length > 0) && (
        <div style={{ background: "#4ade8012", border: "1px solid #4ade8033", borderRadius: 10, padding: "8px 13px", marginBottom: 10, fontSize: 11, color: C.green, fontFamily: "DM Sans, sans-serif", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span>📊 Hai dati da condividere con la nutrizionista!</span>
          <span style={{ color: C.muted, fontSize: 10 }}>Esporta da ⚖️ Peso</span>

        <div style={{ background: "#60a5fa18", border: "1px solid #60a5fa44", borderRadius: 12, padding: "10px 14px", marginBottom: 12, fontSize: 12, color: "#93c5fd", fontFamily: "DM Sans, sans-serif" }}>
          Stai vedendo lo storico di <strong>{formatDataLabel(dataVista)}</strong>. Per aggiungere pasti vai su <strong>Pasto</strong> e scegli la data.
        </div>
      )}

      {/* Pasti raggruppati */}
      {log.length === 0 ? (
        <div style={{ textAlign: "center", color: C.muted, padding: 40, fontFamily: "DM Sans, sans-serif", fontSize: 13 }}>
          {isOggi
            ? <><div style={{ fontSize: 28, marginBottom: 8 }}>🍽️</div>Nessun pasto oggi<br /><span style={{ fontSize: 11, color: C.accent }}>Vai su Pasto per comporre i tuoi pasti!</span></>
            : <><div style={{ fontSize: 28, marginBottom: 8 }}>📭</div>Nessun dato per questo giorno</>
          }
        </div>
      ) : (
        gruppi.map(([gruppo, items]) => {
          const totG = items.reduce((a, i) => {
            const r = i.qty / i.grammiBase;
            return { kcal: a.kcal + i.kcal * r, carbo: a.carbo + i.carbo * r, proteine: a.proteine + i.proteine * r, grassi: a.grassi + i.grassi * r };
          }, { kcal: 0, carbo: 0, proteine: 0, grassi: 0 });
          const col = PASTO_COLORS[gruppo] || C.muted;
          const bg = PASTO_BG[gruppo] || "#64748b18";
          const aperto = expandedGruppi[gruppo] !== false;

          return (
            <div key={gruppo} style={{ marginBottom: 10 }}>
              <div onClick={() => toggleGruppo(gruppo)} style={{
                display: "flex", justifyContent: "space-between", alignItems: "center",
                background: bg, border: `1px solid ${col}44`,
                borderRadius: aperto ? "14px 14px 0 0" : 14,
                padding: "11px 14px", cursor: "pointer", userSelect: "none",
              }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ fontSize: 15, fontWeight: 800, color: col, fontFamily: "DM Sans, sans-serif" }}>{gruppo}</span>

                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: 15, fontWeight: 800, color: col, fontFamily: "DM Mono, monospace" }}>{r2(totG.kcal)} kcal</div>

                    C:{r2(totG.carbo)}g P:{r2(totG.proteine)}g G:{r2(totG.grassi)}g {aperto ? "▲" : "▼"}
                  </div>
                </div>
              </div>
              {aperto && (
                <div style={{ border: `1px solid ${col}33`, borderTop: "none", borderRadius: "0 0 14px 14px", overflow: "hidden" }}>

          );
        })
      )}

      {log.length > 0 && isOggi && (
        <div style={{ marginTop: 8, padding: "10px 14px", background: C.accentDim, borderRadius: 12, fontSize: 11, color: C.accent, fontFamily: "DM Sans, sans-serif", textAlign: "center" }}>

  );

// TAB: COMPONI PASTO — con add-to-diary
// ═══════════════════════════════════════════════════════════════════════════
function PastoTab({ diario, setDiario }) {
  const [tipoPasto, setTipoPasto] = useState("pranzo");

  // Pranzo/Cena
  const [selCarbo, setSelCarbo] = useState(null);
  const [selProt1, setSelProt1] = useState(null);
  const [selProt2, setSelProt2] = useState(null);
  const [split, setSplit] = useState(70);
  const [selVerd, setSelVerd] = useState(null);
  const [olio, setOlio] = useState(true);
  const [selBevanda, setSelBevanda] = useState(null);
  const [selFrutta, setSelFrutta] = useState(null);
  const [selFruttaSecca, setSelFruttaSecca] = useState(null);

  // Colazione
  const [colComp, setColComp] = useState([null, null, null, null]);

  // Spuntino
  const [spuntComp, setSpuntComp] = useState([null, null]);

  // Aperitivo
  const [aperItems, setAperItems] = useState([null, null, null]);

  const [addedToast, setAddedToast] = useState(false);

  const TUTTE_COL = [...COLAZIONI.proteiche, ...COLAZIONI.carboidrati, ...COLAZIONI.grassi_dolci, ...COLAZIONI.bevande, ...COLAZIONI.frutta];
  const TUTTI_SPUNT = [...SPUNTINI.frutta_secca, ...SPUNTINI.proteico, ...SPUNTINI.frutta, ...SPUNTINI.snack_salato];
  const TUTTI_APER = [...APERITIVO.vini_bollicine, ...APERITIVO.birra, ...APERITIVO.cocktail, ...APERITIVO.stuzzichini];
  const PROTS = tipoPasto === "pranzo" ? PROTEINE_PRANZO : PROTEINE_CENA;
  const CARBS = tipoPasto === "pranzo" ? CARBOIDRATI_PRANZO : CARBOIDRATI_CENA;

  function calcPasto() {
    let kcal = 0, carbo = 0, proteine = 0, grassi = 0, items = [];
    const add = (db, nome, r = 1) => { const i = db.find(x => x.nome === nome); if (i) { kcal += i.kcal * r; carbo += i.carbo * r; proteine += i.proteine * r; grassi += i.grassi * r; items.push({ nome: i.nome, grammi: Math.round(i.grammi * r), kcal: i.kcal, carbo: i.carbo, proteine: i.proteine, grassi: i.grassi, grammiBase: i.grammi }); } };

    if (tipoPasto === "colazione") {
      colComp.forEach(n => n && add(TUTTE_COL, n));
    } else if (tipoPasto === "spuntino") {
      spuntComp.forEach(n => n && add(TUTTI_SPUNT, n));
    } else if (tipoPasto === "aperitivo") {
      aperItems.forEach(n => n && add(TUTTI_APER, n));
    } else {
      if (selCarbo) add(CARBS, selCarbo);
      if (selProt1) add(PROTS, selProt1, selProt2 ? split / 100 : 1);
      if (selProt2) add(PROTS, selProt2, (100 - split) / 100);
      if (selVerd) add(VERDURE, selVerd);
      if (olio) { const og = tipoPasto === "pranzo" ? 10 : 20; kcal += og * 9; grassi += og; items.push({ nome: `Olio EVO (${og}g)`, grammi: og, kcal: og * 9, carbo: 0, proteine: 0, grassi: og, grammiBase: og }); }
      if (selBevanda) add(BEVANDE_PASTO, selBevanda);
      if (selFrutta) add(FRUTTA_DOPO_PASTO, selFrutta);
      if (selFruttaSecca) add(FRUTTA_SECCA_DOPO_PASTO, selFruttaSecca);
    }
    return { kcal: r2(kcal), carbo: r2(carbo), proteine: r2(proteine), grassi: r2(grassi), items };
  }

  const pasto = calcPasto();
  const hasContent = pasto.items.length > 0;
  const TIPO_LABELS = { colazione: "🌅 Colazione", pranzo: "☀️ Pranzo", cena: "🌙 Cena", spuntino: "🍎 Spuntino", aperitivo: "🥂 Aperitivo" };

  const [dataTarget, setDataTarget] = useState(todayStr());

  function addToDiary() {
    const key = dataTarget;
    const log = diario[key] || [];
    const isOggi = key === todayStr();
    const oraLabel = isOggi ? nowLabel() : new Date(key + "T12:00:00").toLocaleDateString("it-IT", { day: "numeric", month: "short" }) + " (inserito ora)";
    const newItems = pasto.items.map(item => ({
      id: Date.now() + Math.random(),
      nome: item.nome,
      qty: item.grammi,
      grammiBase: item.grammiBase,
      kcal: item.kcal,
      carbo: item.carbo,
      proteine: item.proteine,
      grassi: item.grassi,
      cat: TIPO_LABELS[tipoPasto],
      ora: oraLabel,
    }));
    setDiario({ ...diario, [key]: [...log, ...newItems] });
    // Reset tutti i campi del pasto
    setSelCarbo(null); setSelProt1(null); setSelProt2(null); setSplit(70);
    setSelVerd(null); setOlio(true); setSelBevanda(null);
    setSelFrutta(null); setSelFruttaSecca(null);
    setColComp([null, null, null, null]);
    setSpuntComp([null, null]);
    setAperItems([null, null, null]);
    setAddedToast(true);
    setTimeout(() => setAddedToast(false), 2500);
  }

  const COL_LABELS = [
    { l: "Proteina", cat: COLAZIONI.proteiche },
    { l: "Carboidrato", cat: COLAZIONI.carboidrati },
    { l: "Condimento", cat: COLAZIONI.grassi_dolci },
    { l: "Bevanda", cat: COLAZIONI.bevande },
  ];

  const SPUNT_LABELS = [
    { l: "Componente 1", cat: TUTTI_SPUNT },
    { l: "Componente 2 (opzionale)", cat: TUTTI_SPUNT },
  ];

  const APER_LABELS = [
    { l: "Drink principale", cat: [...APERITIVO.vini_bollicine, ...APERITIVO.birra, ...APERITIVO.cocktail] },
    { l: "Secondo drink (opzionale)", cat: [...APERITIVO.vini_bollicine, ...APERITIVO.birra, ...APERITIVO.cocktail] },
    { l: "Stuzzichino (opzionale)", cat: APERITIVO.stuzzichini },
  ];

  return (
    <div>
      <div style={{ fontSize: 19, fontWeight: 800, color: C.text, marginBottom: 14, fontFamily: "Playfair Display, serif" }}>Componi il Pasto</div>

      {/* Toast */}
      {addedToast && (
        <div style={{ background: C.green, color: "#0d1821", borderRadius: 12, padding: "10px 16px", marginBottom: 12, fontWeight: 800, fontSize: 13, fontFamily: "DM Sans, sans-serif", textAlign: "center", boxShadow: `0 0 16px ${C.green}55` }}>
          ✅ Pasto aggiunto al diario! ({nowLabel()})
        </div>
      )}

      {/* Tipo pasto */}
      <div style={{ display: "flex", gap: 5, marginBottom: 14, flexWrap: "wrap" }}>
        {Object.entries(TIPO_LABELS).map(([k, l]) => (
          <button key={k} onClick={() => setTipoPasto(k)} style={{
            flex: 1, minWidth: 60, padding: "9px 6px", borderRadius: 11, border: "none", cursor: "pointer",
            background: tipoPasto === k ? (k === "aperitivo" ? C.yellow : k === "spuntino" ? C.violet : C.accent) : C.card,
            color: tipoPasto === k ? "#0d1821" : C.muted,
            fontWeight: 800, fontSize: 11, fontFamily: "DM Sans, sans-serif",
            boxShadow: tipoPasto === k ? `0 0 10px ${k === "aperitivo" ? C.yellow : k === "spuntino" ? C.violet : C.accent}55` : "none"
          }}>{l}</button>
        ))}
      </div>

      <div style={{ background: C.card, borderRadius: 18, padding: 16, marginBottom: 12, border: `1px solid ${C.border}` }}>

        {/* ─── COLAZIONE ─── */}
        {tipoPasto === "colazione" && (
          <>
            <div style={{ fontSize: 12, color: C.violet, fontWeight: 700, marginBottom: 12, fontFamily: "DM Sans, sans-serif", background: "#a78bfa15", padding: "8px 12px", borderRadius: 10 }}>
              💡 Combina fino a 4 componenti. Cornetto o pane+burro+marmellata → elimina frutto e noci dal pranzo.
            </div>
            {COL_LABELS.map((lc, idx) => (
              <SearchSelect key={idx} label={lc.l} value={colComp[idx]} onChange={v => { const n = [...colComp]; n[idx] = v; setColComp(n); }} items={lc.cat} color={C.violet} />
            ))}
            <SearchSelect label="🍓 Frutta" value={colComp[3]} onChange={v => { const n = [...colComp]; n[3] = v; setColComp(n); }} items={COLAZIONI.frutta} color={C.violet} />
          </>
        )}

        {/* ─── PRANZO / CENA ─── */}
        {(tipoPasto === "pranzo" || tipoPasto === "cena") && (
          <>
            <SearchSelect label="🌾 Carboidrato" value={selCarbo} onChange={setSelCarbo} items={CARBS} color={C.carbo} />
            <SearchSelect label="🥩 Proteina principale" value={selProt1} onChange={setSelProt1} items={PROTS} color={C.proteine} groupBy="tipo" />
            <SearchSelect label="🥚 Seconda proteina (opzionale)" value={selProt2} onChange={setSelProt2} items={PROTS.filter(i => i.nome !== selProt1)} color={C.grassi} groupBy="tipo" />
            {selProt1 && selProt2 && (
              <div style={{ background: "#0d1821", borderRadius: 12, padding: 12, marginBottom: 10 }}>
                <div style={{ fontSize: 11, color: C.accent, fontWeight: 700, marginBottom: 8, fontFamily: "DM Sans, sans-serif" }}>⚖️ Dividi le dosi</div>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: C.muted, marginBottom: 4, fontFamily: "DM Mono, monospace" }}>
                  <span style={{ color: C.proteine }}>{selProt1.split(" ")[0]}: {split}% → {Math.round((PROTS.find(i => i.nome === selProt1)?.grammi || 0) * split / 100)}g</span>
                  <span style={{ color: C.grassi }}>{selProt2.split(" ")[0]}: {100 - split}% → {Math.round((PROTS.find(i => i.nome === selProt2)?.grammi || 0) * (100 - split) / 100)}g</span>
                </div>
                <input type="range" min={10} max={90} value={split} onChange={e => setSplit(+e.target.value)} style={{ width: "100%", accentColor: C.accent }} />
              </div>
            )}
            <SearchSelect label="🥦 Verdura (250g base)" value={selVerd} onChange={setSelVerd} items={VERDURE} color={C.green} />
            <SearchSelect label="🍷 Bevanda (opzionale)" value={selBevanda} onChange={setSelBevanda} items={BEVANDE_PASTO} color={C.violet} />
            <SearchSelect label="🍎 Frutto dopo pasto (opzionale)" value={selFrutta} onChange={setSelFrutta} items={FRUTTA_DOPO_PASTO} color={C.green} />
            <SearchSelect label="🥜 Frutta secca / crema (opzionale — cucchiaini)" value={selFruttaSecca} onChange={setSelFruttaSecca} items={FRUTTA_SECCA_DOPO_PASTO} color={C.carbo} />
            <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", marginTop: 6 }}>
              <input type="checkbox" checked={olio} onChange={e => setOlio(e.target.checked)} style={{ accentColor: C.accent, width: 15, height: 15 }} />
              <span style={{ fontSize: 12, color: C.muted, fontFamily: "DM Sans, sans-serif" }}>🫒 Olio EVO ({tipoPasto === "pranzo" ? "1 cucchiaio — 10g" : "2 cucchiai — 20g"})</span>
            </label>
          </>
        )}

        {/* ─── SPUNTINO ─── */}
        {tipoPasto === "spuntino" && (
          <>
            <div style={{ fontSize: 12, color: C.violet, fontWeight: 700, marginBottom: 12, fontFamily: "DM Sans, sans-serif", background: "#a78bfa15", padding: "8px 12px", borderRadius: 10 }}>
              💡 Scegli 1-2 componenti per il tuo spuntino. Dopo pranzo: 1 frutto + 5 noci. Dopo cena: 1 frutto + 3 noci.
            </div>
            {SPUNT_LABELS.map((lc, idx) => (
              <SearchSelect key={idx} label={lc.l} value={spuntComp[idx]}
                onChange={v => { const n = [...spuntComp]; n[idx] = v; setSpuntComp(n); }}
                items={lc.cat} color={C.violet} />
            ))}
          </>
        )}

        {/* ─── APERITIVO ─── */}
        {tipoPasto === "aperitivo" && (
          <>
            <div style={{ fontSize: 12, color: C.yellow, fontWeight: 700, marginBottom: 12, fontFamily: "DM Sans, sans-serif", background: "#fbbf2415", padding: "8px 12px", borderRadius: 10 }}>
              🥂 Aperitivo — scegli i tuoi drink e stuzzichini. Ricorda che l'alcol non è nel tuo piano nutrizionale, monitoralo per non sforare le calorie!
            </div>
            {APER_LABELS.map((lc, idx) => (
              <SearchSelect key={idx} label={lc.l} value={aperItems[idx]}
                onChange={v => { const n = [...aperItems]; n[idx] = v; setAperItems(n); }}
                items={lc.cat} color={C.yellow} />
            ))}
          </>
        )}
      </div>

      {/* Riepilogo + aggiungi al diario */}
      {hasContent && (
        <div style={{ background: `linear-gradient(135deg, ${C.accentDim}, ${C.card})`, borderRadius: 18, padding: 16, border: `1px solid ${C.accent}44` }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: C.accent, marginBottom: 12, fontFamily: "DM Sans, sans-serif" }}>📊 Riepilogo {TIPO_LABELS[tipoPasto]}</div>
          <div style={{ display: "flex", gap: 7, marginBottom: 12, flexWrap: "wrap" }}>
            {[{ l: "Kcal", v: pasto.kcal, c: C.text }, { l: "Carbo", v: `${pasto.carbo}g`, c: C.carbo }, { l: "Prot", v: `${pasto.proteine}g`, c: C.proteine }, { l: "Grassi", v: `${pasto.grassi}g`, c: C.grassi }].map(({ l, v, c }) => (
              <div key={l} style={{ flex: 1, minWidth: 55, background: "#0d182288", borderRadius: 10, padding: "10px 6px", textAlign: "center" }}>
                <div style={{ fontSize: 17, fontWeight: 800, color: c, fontFamily: "DM Mono, monospace" }}>{v}</div>
                <div style={{ fontSize: 9, color: C.muted }}>{l}</div>
              </div>
            ))}
          </div>
          <div style={{ fontSize: 11, color: C.muted, fontFamily: "DM Sans, sans-serif", marginBottom: 12, lineHeight: 1.5 }}>
            {pasto.items.map(i => i.nome).join(" + ")}
          </div>

          {/* Feedback */}
          <div style={{ padding: 10, background: "#0d1821", borderRadius: 10, marginBottom: 14 }}>
            {tipoPasto === "aperitivo" && <div style={{ color: C.yellow, fontSize: 12, fontFamily: "DM Sans, sans-serif" }}>🥂 Aperitivo non pianificato — considera di ridurre un pasto principale oggi</div>}
            {tipoPasto !== "aperitivo" && pasto.proteine < 10 && <div style={{ color: C.orange, fontSize: 12, fontFamily: "DM Sans, sans-serif" }}>⚠️ Proteine basse per questo pasto</div>}
            {tipoPasto !== "aperitivo" && pasto.kcal > 900 && <div style={{ color: C.red, fontSize: 12, fontFamily: "DM Sans, sans-serif" }}>⚠️ Pasto molto calorico</div>}
            {tipoPasto !== "aperitivo" && pasto.proteine >= 10 && pasto.kcal <= 900 && <div style={{ color: C.green, fontSize: 12, fontFamily: "DM Sans, sans-serif" }}>✅ In linea con il tuo piano!</div>}
          </div>

          {/* SELETTORE DATA + PULSANTE AGGIUNGI AL DIARIO */}
          <div style={{ marginBottom: 10 }}>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 5, fontWeight: 600, fontFamily: "DM Sans, sans-serif" }}>
              📅 Aggiungi a quale giorno?
            </div>
            <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
              <input type="date" value={dataTarget} onChange={e => setDataTarget(e.target.value)}
                max={todayStr()}
                style={{ flex: 1, padding: "9px 12px", borderRadius: 10, background: "#0d1821", color: C.text, border: `1px solid ${C.accent}66`, fontSize: 13, fontFamily: "DM Mono, monospace" }} />
              <button onClick={() => setDataTarget(todayStr())} style={{ padding: "9px 12px", borderRadius: 10, background: dataTarget === todayStr() ? C.accent : C.card, color: dataTarget === todayStr() ? "#0d1821" : C.muted, border: "none", cursor: "pointer", fontSize: 11, fontWeight: 700, fontFamily: "DM Sans, sans-serif" }}>Oggi</button>
            </div>
            {dataTarget !== todayStr() && (
              <div style={{ fontSize: 10, color: C.orange, marginTop: 5, fontFamily: "DM Sans, sans-serif" }}>
                ⏪ Stai aggiungendo a un giorno passato: {new Date(dataTarget + "T12:00:00").toLocaleDateString("it-IT", { weekday: "long", day: "numeric", month: "long" })}
              </div>
            )}
          </div>
          <button onClick={addToDiary} style={{
            width: "100%", background: C.accent, color: "#0d1821", border: "none", borderRadius: 12,
            padding: "13px", fontWeight: 800, fontSize: 14, cursor: "pointer", fontFamily: "DM Sans, sans-serif",
            boxShadow: `0 0 16px ${C.accent}66`, letterSpacing: 0.3
          }}>
            ➕ Aggiungi al Diario — {dataTarget === todayStr() ? nowLabel() : new Date(dataTarget + "T12:00:00").toLocaleDateString("it-IT", { day: "numeric", month: "short" })}
          </button>
        </div>
      )}
    </div>
  );
}

// TAB: FRIGO
// ═══════════════════════════════════════════════════════════════════════════
function FrigoTab() {
  const TUTTO = [
    ...CARBOIDRATI_PRANZO.map(i => ({ ...i, tipo: "carbo" })),
    ...PROTEINE_PRANZO.map(i => ({ ...i, tipo: "proteina" })),
    ...PROTEINE_CENA.map(i => ({ ...i, tipo: "proteina_cena" })),
    ...VERDURE.map(i => ({ ...i, tipo: "verdura" })),
  ];
  const [frigo, setFrigo] = usePersist("ng_frigo_v4", []);
  const [cerca, setCerca] = useState("");
  const [filtroTipo, setFiltroTipo] = useState("tutti");

  const filtrati = TUTTO.filter(i => {
    const mc = i.nome.toLowerCase().includes(cerca.toLowerCase());
    const mt = filtroTipo === "tutti" || i.tipo === filtroTipo || (filtroTipo === "proteina" && i.tipo === "proteina_cena");
    return mc && mt;
  });

  const toggle = nome => setFrigo(p => p.includes(nome) ? p.filter(n => n !== nome) : [...p, nome]);

  function suggerisci() {
    const items = TUTTO.filter(i => frigo.includes(i.nome));
    const carbs = items.filter(i => i.tipo === "carbo");
    const prots = items.filter(i => i.tipo === "proteina" || i.tipo === "proteina_cena");
    const verd = items.filter(i => i.tipo === "verdura");
    const combos = [];
    for (const c of carbs) {
      for (const p of prots) {
        const v = verd[0];
        combos.push({ tipo: p.tipo === "proteina" ? "Pranzo ☀️" : "Cena 🌙", items: [c.nome, p.nome, ...(v ? [v.nome] : []), "Olio EVO"], kcal: r2((c.kcal || 0) + (p.kcal || 0) + (v?.kcal || 0) + 90) });
      }
    }
    return combos.slice(0, 5);
  }

  return (
    <div>
      <div style={{ fontSize: 19, fontWeight: 800, color: C.text, marginBottom: 6, fontFamily: "Playfair Display, serif" }}>Frigo & Dispensa</div>
      <div style={{ fontSize: 12, color: C.muted, marginBottom: 12, fontFamily: "DM Sans, sans-serif" }}>Seleziona cosa hai a casa → ottengo suggerimenti sui pasti</div>
      <input placeholder="🔍 Cerca ingrediente..." value={cerca} onChange={e => setCerca(e.target.value)}
        style={{ width: "100%", padding: "10px 14px", borderRadius: 12, background: C.card, color: C.text, border: `1px solid ${C.border}`, marginBottom: 10, fontSize: 13, fontFamily: "DM Sans, sans-serif", boxSizing: "border-box" }} />
      <div style={{ display: "flex", gap: 6, marginBottom: 12, flexWrap: "wrap" }}>
        {[["tutti", "Tutti"], ["carbo", "🌾 Carbo"], ["proteina", "🥩 Proteine"], ["verdura", "🥦 Verdure"]].map(([k, l]) => (
          <button key={k} onClick={() => setFiltroTipo(k)} style={{ padding: "5px 10px", borderRadius: 99, fontSize: 11, cursor: "pointer", background: filtroTipo === k ? C.accent : C.border, color: filtroTipo === k ? "#0d1821" : C.muted, border: "none", fontWeight: 700, fontFamily: "DM Sans, sans-serif" }}>{l}</button>
        ))}
      </div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 16, maxHeight: 190, overflowY: "auto" }}>
        {filtrati.map(item => (
          <button key={item.nome} onClick={() => toggle(item.nome)} style={{ padding: "5px 10px", borderRadius: 99, fontSize: 11, cursor: "pointer", background: frigo.includes(item.nome) ? C.accent : C.card, color: frigo.includes(item.nome) ? "#0d1821" : C.muted, border: `1px solid ${frigo.includes(item.nome) ? C.accent : C.border}`, fontWeight: 700, fontFamily: "DM Sans, sans-serif", boxShadow: frigo.includes(item.nome) ? `0 0 6px ${C.accent}55` : "none" }}>
            {item.nome.split("(")[0].trim()}
          </button>
        ))}
      </div>
      {frigo.length > 0 && (
        <>
          <div style={{ fontSize: 13, fontWeight: 700, color: C.accent, marginBottom: 10, fontFamily: "DM Sans, sans-serif" }}>💡 Combinazioni suggerite ({frigo.length} ingredienti)</div>
          {suggerisci().length === 0 ? (
            <div style={{ background: C.card, borderRadius: 12, padding: 16, color: C.muted, fontSize: 12, fontFamily: "DM Sans, sans-serif" }}>Aggiungi almeno un carboidrato + una proteina!</div>
          ) : suggerisci().map((c, i) => (
            <div key={i} style={{ background: C.card, borderRadius: 12, padding: 14, marginBottom: 8, border: `1px solid ${C.border}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}>
                <span style={{ fontSize: 12, fontWeight: 700, color: C.accent, fontFamily: "DM Sans, sans-serif" }}>{c.tipo}</span>
                <span style={{ fontSize: 11, color: C.muted, fontFamily: "DM Mono, monospace" }}>~{c.kcal} kcal</span>
              </div>
              <div style={{ fontSize: 12, color: C.text, fontFamily: "DM Sans, sans-serif", lineHeight: 1.5 }}>{c.items.join(" + ")}</div>
            </div>
          ))}
        </>
      )}
    </div>
  );
}

// TAB: PESO
// ═══════════════════════════════════════════════════════════════════════════
function PesoTab({ pesi, setPesi, diario }) {
  const [pesoInput, setPesoInput] = useState("");
  const [dataInput, setDataInput] = useState(todayStr());
  const [notaInput, setNotaInput] = useState("");
  const [exporting, setExporting] = useState(false);

  function aggiungi() {
    if (!pesoInput || !dataInput) return;
    setPesi([...pesi.filter(p => p.data !== dataInput), { data: dataInput, kg: parseFloat(pesoInput), nota: notaInput }].sort((a, b) => a.data.localeCompare(b.data)));
    setPesoInput(""); setNotaInput("");
  }

  const ultimo = pesi[pesi.length - 1];
  const primo = pesi[0];
  const diffTot = ultimo && primo ? (ultimo.kg - primo.kg).toFixed(1) : 0;
  const mancano = ultimo ? (ultimo.kg - 65).toFixed(1) : "-";

  const cW = 320, cH = 170, pad = { t: 22, r: 20, b: 32, l: 40 };
  const iW = cW - pad.l - pad.r, iH = cH - pad.t - pad.b;
  const kgs = pesi.map(p => p.kg);
  const minK = Math.min(...kgs, 64) - 0.5, maxK = Math.max(...kgs, 76) + 0.5;
  const xP = i => pad.l + (i / Math.max(pesi.length - 1, 1)) * iW;
  const yP = kg => pad.t + iH - ((kg - minK) / (maxK - minK)) * iH;
  const pathD = pesi.length > 1 ? pesi.map((p, i) => `${i === 0 ? "M" : "L"}${xP(i)},${yP(p.kg)}`).join(" ") : "";

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <div style={{ fontSize: 19, fontWeight: 800, color: C.text, fontFamily: "Playfair Display, serif" }}>Tracker Peso</div>
        <button onClick={() => { setExporting(true); setTimeout(() => { esportaDiarioCSV(diario, pesi); setExporting(false); }, 100); }}
          style={{ background: exporting ? C.border : "#4ade8033", color: C.green, border: `1px solid ${C.green}55`, borderRadius: 10, padding: "8px 13px", fontWeight: 800, fontSize: 12, cursor: "pointer", fontFamily: "DM Sans, sans-serif", display: "flex", alignItems: "center", gap: 5 }}>
          {exporting ? "⏳" : "📥"} {exporting ? "Preparando..." : "Esporta Excel"}
        </button>
      </div>
      <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
        {[
          { l: "Peso attuale", v: `${ultimo?.kg || "-"} kg`, c: C.accent },
          { l: "Mancano", v: parseFloat(mancano) > 0 ? `-${mancano} kg` : "✅ OBJ!", c: parseFloat(mancano) > 0 ? C.orange : C.green },
          { l: "Perso totale", v: `${diffTot} kg`, c: parseFloat(diffTot) < 0 ? C.green : C.red },
        ].map(({ l, v, c }) => (
          <div key={l} style={{ flex: 1, background: C.card, borderRadius: 14, padding: "12px 8px", textAlign: "center", border: `1px solid ${C.border}` }}>
            <div style={{ fontSize: 15, fontWeight: 800, color: c, fontFamily: "DM Mono, monospace", lineHeight: 1.2 }}>{v}</div>
            <div style={{ fontSize: 9, color: C.muted, marginTop: 4, fontFamily: "DM Sans, sans-serif" }}>{l}</div>
          </div>
        ))}
      </div>

      <div style={{ background: C.card, borderRadius: 18, padding: 16, marginBottom: 14, border: `1px solid ${C.border}`, overflowX: "auto" }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: C.muted, marginBottom: 10, fontFamily: "DM Sans, sans-serif" }}>📈 Andamento dal {primo?.data?.slice(0, 7) || "-"}</div>
        <svg width="100%" viewBox={`0 0 ${cW} ${cH}`} style={{ maxWidth: "100%", minWidth: 260 }}>
          {[65, 68, 71, 74].map(kg => (
            <g key={kg}>
              <line x1={pad.l} y1={yP(kg)} x2={cW - pad.r} y2={yP(kg)} stroke={C.border} strokeWidth={0.5} />
              <text x={pad.l - 4} y={yP(kg) + 3} fill={C.muted} fontSize={8} textAnchor="end" fontFamily="DM Mono, monospace">{kg}</text>
            </g>
          ))}
          <line x1={pad.l} y1={yP(65)} x2={cW - pad.r} y2={yP(65)} stroke={C.green} strokeWidth={1.5} strokeDasharray="5,4" />
          <text x={cW - pad.r} y={yP(65) - 5} fill={C.green} fontSize={9} textAnchor="end">65kg 🎯</text>
          {pesi.length > 1 && <path d={`${pathD} L${xP(pesi.length - 1)},${pad.t + iH} L${xP(0)},${pad.t + iH} Z`} fill={`${C.accent}18`} />}
          {pesi.length > 1 && <path d={pathD} fill="none" stroke={C.accent} strokeWidth={2.5} style={{ filter: `drop-shadow(0 0 4px ${C.accent})` }} />}
          {pesi.map((p, i) => (
            <g key={i}>
              <circle cx={xP(i)} cy={yP(p.kg)} r={5} fill={C.accent} style={{ filter: `drop-shadow(0 0 4px ${C.accent})` }} />
              <text x={xP(i)} y={yP(p.kg) - 9} fill={C.text} fontSize={8} textAnchor="middle" fontFamily="DM Mono, monospace">{p.kg}</text>
              <text x={xP(i)} y={cH - 6} fill={C.muted} fontSize={7} textAnchor="middle" fontFamily="DM Sans, sans-serif">{p.data.slice(5)}</text>
            </g>
          ))}
        </svg>
      </div>

      <div style={{ background: C.card, borderRadius: 18, padding: 16, marginBottom: 14, border: `1px solid ${C.border}` }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: C.accent, marginBottom: 12, fontFamily: "DM Sans, sans-serif" }}>⚖️ Registra misurazione</div>
        <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
          <input type="date" value={dataInput} onChange={e => setDataInput(e.target.value)}
            style={{ flex: 1, padding: "9px 12px", borderRadius: 10, background: "#0d1821", color: C.text, border: `1px solid ${C.border}`, fontSize: 13, fontFamily: "DM Sans, sans-serif" }} />
          <input type="number" step="0.1" placeholder="kg (es. 65.2)" value={pesoInput} onChange={e => setPesoInput(e.target.value)}
            style={{ flex: 1, padding: "9px 12px", borderRadius: 10, background: "#0d1821", color: C.text, border: `1px solid ${C.border}`, fontSize: 13, fontFamily: "DM Mono, monospace" }} />
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <input placeholder="Nota (es. dopo palestra)" value={notaInput} onChange={e => setNotaInput(e.target.value)}
            style={{ flex: 1, padding: "9px 12px", borderRadius: 10, background: "#0d1821", color: C.text, border: `1px solid ${C.border}`, fontSize: 12, fontFamily: "DM Sans, sans-serif" }} />
          <button onClick={aggiungi} style={{ background: C.accent, color: "#0d1821", border: "none", borderRadius: 10, padding: "9px 16px", fontWeight: 800, fontSize: 13, cursor: "pointer", fontFamily: "DM Sans, sans-serif", boxShadow: `0 0 10px ${C.accent}55` }}>Salva</button>
        </div>
      </div>

      <div style={{ fontSize: 12, fontWeight: 700, color: C.muted, marginBottom: 8, fontFamily: "DM Sans, sans-serif" }}>📋 Storico</div>
      {[...pesi].reverse().map((p, i) => (
        <div key={i} style={{ background: C.card, borderRadius: 11, padding: "9px 14px", marginBottom: 5, display: "flex", justifyContent: "space-between", alignItems: "center", border: `1px solid ${C.border}` }}>
          <div>
            <div style={{ fontSize: 12, color: C.muted, fontFamily: "DM Sans, sans-serif" }}>{new Date(p.data + "T12:00:00").toLocaleDateString("it-IT", { day: "numeric", month: "short", year: "numeric" })}</div>
            {p.nota && <div style={{ fontSize: 10, color: C.accent, fontFamily: "DM Sans, sans-serif" }}>{p.nota}</div>}
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 15, fontWeight: 800, color: C.accent, fontFamily: "DM Mono, monospace" }}>{p.kg} kg</span>
            <button onClick={() => setPesi(pesi.filter(x => x.data !== p.data))}
              style={{ background: "#f8717122", color: C.red, border: "none", borderRadius: 7, padding: "4px 8px", cursor: "pointer", fontSize: 11 }}>✕</button>
          </div>
        </div>
      ))}
    </div>
  );
}

// APP ROOT
// ═══════════════════════════════════════════════════════════════════════════
function NutriGabri() {
  const [tab, setTab] = useState("diario");
  const [diario, setDiario] = usePersist("ng_diario_v4", {});
  const [pesi, setPesi] = usePersist("ng_pesi_v4", [
    { data: "2025-09-14", kg: 75.1, nota: "Inizio piano Dott.ssa Pietrobono" },
    { data: "2026-01-15", kg: 70.5, nota: "" },
    { data: "2026-03-05", kg: 65.6, nota: "Bilancia Fitdays" },
  ]);

  const log = diario[todayStr()] || [];
  const totKcal = log.reduce((a, i) => a + i.kcal * (i.qty / i.grammiBase), 0);
  const totC = log.reduce((a, i) => a + i.carbo * (i.qty / i.grammiBase), 0);
  const totP = log.reduce((a, i) => a + i.proteine * (i.qty / i.grammiBase), 0);
  const totG = log.reduce((a, i) => a + i.grassi * (i.qty / i.grammiBase), 0);

  const TABS = [
    { key: "diario", icon: "📔", label: "Diario" },
    { key: "pasto", icon: "🍽️", label: "Pasto" },
    { key: "frigo", icon: "🥦", label: "Frigo" },
    { key: "peso", icon: "⚖️", label: "Peso" },
  ];

  return (
    <>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;600;700;800&family=DM+Mono:wght@400;700&display=swap" rel="stylesheet" />
      <div style={{ minHeight: "100vh", background: C.bg, color: C.text, fontFamily: "DM Sans, sans-serif", maxWidth: 480, margin: "0 auto", paddingBottom: 80 }}>

        {/* Header */}
        <div style={{ background: `linear-gradient(135deg, ${C.card}, #0d2035)`, padding: "20px 16px 14px", borderBottom: `1px solid ${C.border}`, position: "sticky", top: 0, zIndex: 50 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontSize: 22, fontWeight: 800, fontFamily: "Playfair Display, serif", color: C.accent, letterSpacing: "-0.5px" }}>NutriGabri</div>
              <div style={{ fontSize: 10, color: C.muted }}>Piano 1600 kcal · 33 anni · obj 65 kg</div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontSize: 20, fontWeight: 800, color: totKcal > PIANO_KCAL ? C.red : C.text, fontFamily: "DM Mono, monospace" }}>{r2(totKcal)}</div>
              <div style={{ fontSize: 9, color: C.muted }}>/ {PIANO_KCAL} kcal oggi</div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 5, marginTop: 11 }}>
            {[{ label: "C", cur: totC, max: TARGET.carbo, color: C.carbo }, { label: "P", cur: totP, max: TARGET.proteine, color: C.proteine }, { label: "G", cur: totG, max: TARGET.grassi, color: C.grassi }].map(({ label, cur, max, color }) => (
              <div key={label} style={{ flex: 1 }}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: C.muted, marginBottom: 2 }}><span>{label}</span><span>{r2(cur)}/{max}g</span></div>
                <div style={{ height: 4, background: C.border, borderRadius: 99 }}>
                  <div style={{ height: "100%", background: cur > max ? C.red : color, borderRadius: 99, width: `${Math.min(cur / max * 100, 100)}%`, boxShadow: `0 0 5px ${color}88` }} />
                </div>
              </div>
            ))}
          </div>
        </div>

        <div style={{ padding: "16px 14px" }}>
          {tab === "diario" && <DiarioTab diario={diario} setDiario={setDiario} />}
          {tab === "pasto" && <PastoTab diario={diario} setDiario={setDiario} />}
          {tab === "frigo" && <FrigoTab />}
          {tab === "peso" && <PesoTab pesi={pesi} setPesi={setPesi} diario={diario} />}
        </div>

        {/* Bottom Nav */}
        <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 480, background: C.card, borderTop: `1px solid ${C.border}`, display: "flex", zIndex: 50 }}>
          {TABS.map(t => (
            <button key={t.key} onClick={() => setTab(t.key)} style={{ flex: 1, padding: "11px 6px", border: "none", background: "transparent", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
              <span style={{ fontSize: 19 }}>{t.icon}</span>
              <span style={{ fontSize: 10, fontWeight: 700, fontFamily: "DM Sans, sans-serif", color: tab === t.key ? C.accent : C.muted, borderBottom: tab === t.key ? `2px solid ${C.accent}` : "2px solid transparent", paddingBottom: 1 }}>{t.label}</span>
            </button>
          ))}
        </div>
      </div>
    </>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<NutriGabri />);
  </script>
</body>
